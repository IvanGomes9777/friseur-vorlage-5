<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hair Power · Galerie – 5 Konzepte</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(480px,78vh,860px);overflow-y:auto;overflow-x:hidden;position:relative;background:#F9F6F2;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s var(--eo),transform .6s var(--eo)}.reveal.in{opacity:1;transform:none}
  .hsnap{scroll-snap-type:x mandatory}.hsnap>*{scroll-snap-align:center}
  .tcard{transform-style:preserve-3d;transition:transform .5s var(--eo);will-change:transform}.tcard.live{transition:none}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important}.tcard{transition:none}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Hair Power · Relaunch</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Sektion 07 — Galerie / Lookbook</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Fünf Richtungen. Tab wählen; Bild anklicken öffnet die Lightbox. Bilder = Unsplash-Vorschau (final eure echten Arbeiten – mit Einwilligung).</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">friseur-hairpower.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Lookbook · DSGVO: echte Kundenfotos nur mit schriftlicher Einwilligung.</footer>

<!-- Lightbox -->
<div id="lb" class="fixed inset-0 z-[60] hidden place-items-center bg-ink/90 p-6"><button id="lb-x" class="absolute right-5 top-4 text-3xl text-cream">×</button><img id="lb-img" class="max-h-[85vh] max-w-4xl rounded-xl object-contain" alt=""></div>

<script>
const U=id=>`https://images.unsplash.com/${id}?auto=format&fit=crop&w=800&q=72`;
const GAL=[
  [U('photo-1521590832167-7bcbfaa6381f'),'Damen-Haarschnitt','damen'],
  [U('photo-1522336572468-97b06e8ef143'),'Balayage / Farbe','farbe'],
  [U('photo-1503951914875-452162b0f3f1'),'Herren-Schnitt','herren'],
  [U('photo-1519741497674-611481863552'),'Hochzeitsfrisur','hochzeit'],
  [U('photo-1580618672591-eb180b1a973f'),'Damen-Styling','damen'],
  [U('photo-1560869713-7d0a29430803'),'Strähnen / Farbe','farbe'],
  [U('photo-1599351431202-1e0f0137899a'),'Herren-Look','herren'],
  [U('photo-1595152772835-219674b2a8a6'),'Hochsteckfrisur','hochzeit'],
  [U('photo-1605497788044-5a32c7078486'),'Kinder-Haarschnitt','kinder'],
  [U('photo-1560066984-138dadb4c035'),'Frischer Schnitt','kinder'],
];
const FILTERS=[['alle','Alle'],['damen','Damen'],['herren','Herren'],['farbe','Farbe'],['kinder','Kinder'],['hochzeit','Hochzeit']];
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
const fine=()=>matchMedia('(hover:hover) and (pointer:fine)').matches && !reduced();
// Lightbox
const lb=document.getElementById('lb'),lbImg=document.getElementById('lb-img');
function openLB(src){lbImg.src=src.replace('w=800','w=1400');lb.style.display='grid';}
lb.onclick=()=>lb.style.display='none';document.getElementById('lb-x').onclick=()=>lb.style.display='none';
addEventListener('keydown',e=>e.key==='Escape'&&(lb.style.display='none'));

const CONCEPTS={

/* 01 · FILTERABLE GRID */
grid:{
  label:'01 · Filterbares Raster',
  blurb:'Quadrat-Raster mit Filter-Tabs, Hover-Zoom, Klick öffnet Lightbox. Kompakt, übersichtlich (aktuell).',
  motion:'Filter blendet neu ein (fade), Hover-Zoom + Verdunkler + Lupe. Lightbox per Klick.',
  vibe:'Übersichtlich · klassisch',
  render:()=>`
  <section class="bg-cream px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Unsere Werke</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.06s">Lookbook</h2>
    <div id="g-filters" class="reveal mt-5 inline-flex flex-wrap gap-1.5 rounded-full bg-cream2 p-1.5" style="transition-delay:.12s"></div>
    <div id="g-grid" class="mt-5 grid grid-cols-3 gap-3 sm:grid-cols-4 lg:grid-cols-5"></div>
  </section>${filler('light')}`,
  init:(vp)=>filterGrid(vp,'#g-filters','#g-grid',(it)=>`<button onclick="openLB('${it[0]}')" class="group relative aspect-square overflow-hidden rounded-xl"><img src="${it[0]}" class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${it[1]}"><span class="pointer-events-none absolute inset-0 bg-ink/0 transition-colors group-hover:bg-ink/15"></span><span class="pointer-events-none absolute right-2 top-2 text-white opacity-0 transition-opacity group-hover:opacity-100">⤢</span></button>`),
},

/* 02 · MASONRY */
masonry:{
  label:'02 · Masonry Lookbook',
  blurb:'Versetztes Masonry-Raster mit unterschiedlichen Höhen – editorial & lebendig. Filter + Lightbox.',
  motion:'Spalten-Layout (CSS columns), Bilder reveal-en, Hover-Zoom. Klick öffnet Lightbox.',
  vibe:'Editorial · lebendig',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Unsere Werke</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.06s">Lookbook</h2>
    <div id="m-filters" class="reveal mt-5 inline-flex flex-wrap gap-1.5 rounded-full bg-cream p-1.5" style="transition-delay:.12s"></div>
    <div id="m-grid" class="mt-5 columns-2 gap-3 sm:columns-3 lg:columns-4 [column-fill:balance]"></div>
  </section>${filler('light')}`,
  init:(vp)=>filterGrid(vp,'#m-filters','#m-grid',(it,i)=>`<button onclick="openLB('${it[0]}')" class="group relative mb-3 block w-full overflow-hidden rounded-xl"><img src="${it[0]}" class="w-full object-cover transition-transform duration-500 group-hover:scale-105" style="aspect-ratio:${i%3===0?'3/4':i%3===1?'1/1':'4/5'}" alt="${it[1]}"><span class="pointer-events-none absolute inset-x-0 bottom-0 bg-gradient-to-t from-ink/70 to-transparent p-3 text-left text-xs text-cream opacity-0 transition-opacity group-hover:opacity-100">${it[1]}</span></button>`),
},

/* 03 · HORIZONTAL FILMSTRIP */
filmstrip:{
  label:'03 · Horizontaler Filmstrip',
  blurb:'Große Bilder zum seitlichen Wischen, mit Titel. Kinematisch, präsentiert jede Arbeit groß.',
  motion:'Native Scroll-Snap (X). Bild groß, Caption unten. Klick öffnet Lightbox.',
  vibe:'Cinematic · großformatig',
  render:()=>`
  <section class="bg-cream py-12">
    <div class="px-7 sm:px-10"><p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Unsere Werke</p><h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.06s">Lookbook</h2></div>
    <div class="hsnap mt-6 flex gap-5 overflow-x-auto px-7 pb-4 sm:px-10">
      ${GAL.map(it=>`<figure class="w-[78%] shrink-0 sm:w-[48%]"><button onclick="openLB('${it[0]}')" class="group block w-full overflow-hidden rounded-2xl"><div class="relative aspect-[4/3]"><img src="${it[0]}" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-105" alt="${it[1]}"></div></button><figcaption class="mt-2 font-serif text-lg text-ink">${it[1]}</figcaption></figure>`).join('')}
    </div>
    <p class="px-7 text-center text-xs text-inkSoft sm:px-10">← horizontal wischen →</p>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 04 · DARK LUXE GALLERY */
luxe:{
  label:'04 · Dark Luxe Galerie',
  blurb:'Dunkle Bühne, ein großes Feature-Bild + elegantes Raster, Gold-Akzente. Kohärent zu Hero/Über uns/Team.',
  motion:'Feature reveal-t groß; Raster staffelt nach. Hover-Zoom + Gold-Rahmen. Lightbox.',
  vibe:'Luxus · markentreu',
  render:()=>`
  <section class="bg-ink px-7 py-14 text-cream sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">Unsere Werke</p>
    <h2 class="reveal mt-3 mb-7 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.06s">Lookbook</h2>
    <div class="grid gap-4 md:grid-cols-[1.4fr_1fr]">
      <button onclick="openLB('${GAL[1][0]}')" class="reveal group relative overflow-hidden rounded-2xl ring-1 ring-orange/30"><div class="relative aspect-[4/3] md:aspect-auto md:h-full"><img src="${GAL[1][0]}" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-105" alt="${GAL[1][1]}"></div><span class="absolute left-4 top-4 rounded-full bg-orange px-3 py-1 text-xs font-semibold text-ink">Highlight · Balayage</span></button>
      <div class="grid grid-cols-2 gap-4">
        ${GAL.slice(2,6).map(it=>`<button onclick="openLB('${it[0]}')" class="reveal group relative overflow-hidden rounded-2xl ring-1 ring-orange/20"><div class="relative aspect-square"><img src="${it[0]}" class="h-full w-full object-cover grayscale-[.2] transition-all duration-500 group-hover:scale-105 group-hover:grayscale-0" alt="${it[1]}"></div></button>`).join('')}
      </div>
    </div>
    <div class="mt-4 grid grid-cols-3 gap-4 sm:grid-cols-5">${GAL.slice(5).map(it=>`<button onclick="openLB('${it[0]}')" class="reveal group relative overflow-hidden rounded-xl ring-1 ring-orange/20"><div class="relative aspect-square"><img src="${it[0]}" class="h-full w-full object-cover transition-transform duration-500 group-hover:scale-110" alt="${it[1]}"></div></button>`).join('')}</div>
  </section>${filler('dark')}`,
  init:()=>{},
},

/* 05 · 3D TILT GRID */
tilt:{
  label:'05 · 3D Tilt-Raster',
  blurb:'Bilder-Kacheln, die sich leicht zum Cursor neigen. Verspielt-premium, „lebendig". Klick öffnet Lightbox.',
  motion:'Spring-Lerp-Tilt pro Kachel, Reveal-Stagger. Touch/reduce: ruhiges Raster.',
  vibe:'Verspielt-premium · 3D',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Unsere Werke</p>
    <h2 class="reveal mt-3 mb-7 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.06s">Lookbook</h2>
    <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4" style="perspective:900px">
      ${GAL.map(it=>`<article class="reveal"><button onclick="openLB('${it[0]}')" class="tcard block w-full overflow-hidden rounded-2xl shadow-lg"><div class="relative aspect-square"><img src="${it[0]}" class="h-full w-full object-cover" alt="${it[1]}"></div></button></article>`).join('')}
    </div>
  </section>${filler('light')}`,
  init:(vp)=>{const cards=[...vp.querySelectorAll('.tcard')];if(!fine())return;const lp=(a,b,t)=>a+(b-a)*t;
    cards.forEach(card=>{let tx=0,ty=0,cx=0,cy=0,raf=null,act=false;const loop=()=>{cx=lp(cx,tx,.15);cy=lp(cy,ty,.15);card.style.transform=`rotateX(${(-cy*10).toFixed(2)}deg) rotateY(${(cx*12).toFixed(2)}deg)`;if(act||Math.abs(cx-tx)>.01)raf=requestAnimationFrame(loop);else raf=null;};card.classList.add('live');
      card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();tx=(e.clientX-r.left)/r.width-.5;ty=(e.clientY-r.top)/r.height-.5;act=true;if(!raf)raf=requestAnimationFrame(loop);});
      card.addEventListener('mouseleave',()=>{tx=0;ty=0;act=false;if(!raf)raf=requestAnimationFrame(loop);});});},
},
};

/* ============ HELPERS ============ */
function filterGrid(vp,fSel,gSel,tpl){const fbox=vp.querySelector(fSel),grid=vp.querySelector(gSel);let f='alle';
  const draw=()=>{fbox.innerHTML=FILTERS.map(([id,l])=>`<button data-f="${id}" class="min-h-[36px] rounded-full px-4 text-sm font-semibold transition-colors ${id===f?'bg-white text-ink shadow':'text-inkSoft hover:text-ink'}">${l}</button>`).join('');
    fbox.querySelectorAll('button').forEach(b=>b.onclick=()=>{f=b.dataset.f;draw();});
    const items=f==='alle'?GAL:GAL.filter(g=>g[2]===f);grid.innerHTML=items.map((it,i)=>tpl(it,i)).join('');};
  draw();}
function filler(t){const d=t==='dark';return `<section class="${d?'bg-ink text-cream':'bg-cream2 text-ink'} px-6 py-12"><p class="text-center font-serif text-lg ${d?'text-cream/55':'text-inkSoft'}">↑ weiter scrollen</p><div class="h-[24vh]"></div></section>`;}
let io;function wireReveal(vp){if(io)io.disconnect();io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.08});[...vp.querySelectorAll('.reveal')].forEach((el,i)=>{if(!el.style.transitionDelay)el.style.transitionDelay=(i*0.05)+'s';io.observe(el);});}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();wireReveal(vp);requestAnimationFrame(()=>{vp.querySelectorAll('.reveal').forEach(el=>{const r=el.getBoundingClientRect();if(r.top<vp.clientHeight+60)el.classList.add('in');});c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
