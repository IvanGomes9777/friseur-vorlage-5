<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hair Power · Kontakt – 5 Konzepte</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(480px,78vh,860px);overflow-y:auto;overflow-x:hidden;position:relative;background:#F9F6F2;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s var(--eo),transform .7s var(--eo)}.reveal.in{opacity:1;transform:none}
  .lift{transition:transform .3s var(--eo),box-shadow .3s var(--eo)}.lift:hover{transform:translateY(-4px);box-shadow:0 24px 50px -28px rgba(42,33,27,.45)}
  /* faux map */
  .map{background:
    repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0 1px,transparent 1px 28px),
    repeating-linear-gradient(90deg,rgba(0,0,0,.05) 0 1px,transparent 1px 28px),
    linear-gradient(135deg,#e9e3d8,#dcd2c2)}
  .map-dark{background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,transparent 1px 28px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,transparent 1px 28px),
    linear-gradient(135deg,#241b14,#15100b)}
  @keyframes pin{0%{transform:translateY(0)}50%{transform:translateY(-6px)}100%{transform:translateY(0)}}
  .pin{animation:pin 2.4s ease-in-out infinite}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important}.pin{animation:none}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Hair Power · Relaunch</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Sektion 08 — Kontakt & Anfahrt</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Fünf Richtungen. Echte Adresse/Zeiten · Formular mit DSGVO-Checkbox · Karte erst nach Consent (hier stilisiert).</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">friseur-hairpower.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Echte Standortdaten · Karte Consent-gated (DSGVO) · Honeypot-Spamschutz.</footer>

<script>
const S={street:'Grevener Str. 63',zip:'48149',city:'Münster',district:'York Center · Kreuzviertel',phone:'0251 5340748',email:'info@friseur-hairpower.de',
  hours:[['Montag','Ruhetag'],['Dienstag – Freitag','08:30 – 18:00'],['Samstag','08:00 – 13:00'],['Sonntag','geschlossen']]};
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
const mapBox=(dark)=>`<div class="map${dark?'-dark':''} relative grid h-full min-h-[200px] w-full place-items-center overflow-hidden rounded-2xl"><span class="pin grid h-12 w-12 place-items-center rounded-full bg-terra text-2xl text-white shadow-lg">📍</span><span class="absolute bottom-3 left-3 rounded-full bg-white/80 px-3 py-1 text-xs font-semibold text-ink">Grevener Str. 63 · Kreuzviertel</span><button class="absolute right-3 top-3 rounded-full bg-ink/80 px-3 py-1 text-xs font-semibold text-cream">Karte laden (Consent)</button></div>`;
const hoursList=(d)=>S.hours.map(([a,b])=>`<span class="flex justify-between gap-6 ${d?'text-cream/70':'text-inkSoft'}"><span>${a}</span><span>${b}</span></span>`).join('');
function form(dark){const inp=dark?'border-white/15 bg-white/5 text-cream placeholder:text-cream/40':'border-ink/15 bg-white';return `
  <form onsubmit="return false" class="space-y-3">
    <div><label class="mb-1 block text-xs font-semibold ${dark?'text-cream/70':'text-inkSoft'}">Name</label><input class="min-h-[44px] w-full rounded-lg border ${inp} px-3.5 text-sm outline-none focus:outline-2 focus:outline-terra" placeholder="Dein Name"></div>
    <div><label class="mb-1 block text-xs font-semibold ${dark?'text-cream/70':'text-inkSoft'}">E-Mail</label><input class="min-h-[44px] w-full rounded-lg border ${inp} px-3.5 text-sm outline-none focus:outline-2 focus:outline-terra" placeholder="du@beispiel.de"></div>
    <div><label class="mb-1 block text-xs font-semibold ${dark?'text-cream/70':'text-inkSoft'}">Nachricht</label><textarea rows="3" class="w-full resize-y rounded-lg border ${inp} px-3.5 py-2.5 text-sm outline-none focus:outline-2 focus:outline-terra" placeholder="Worum geht's?"></textarea></div>
    <label class="flex items-start gap-2.5 text-xs ${dark?'text-cream/60':'text-inkSoft'}"><input type="checkbox" class="mt-0.5 h-4 w-4 accent-terra"><span>Ich habe die <a href="#" class="font-semibold ${dark?'text-orange':'text-brownDark'} underline-offset-2 hover:underline">Datenschutzerklärung</a> gelesen.</span></label>
    <button class="btn inline-flex min-h-[48px] w-full items-center justify-center rounded-xl bg-terra px-6 font-semibold text-white hover:bg-brownDark">Nachricht senden</button>
    <p class="text-xs ${dark?'text-cream/50':'text-inkSoft'}">🔒 Datenschutzfreundlicher Spam-Schutz (kein reCAPTCHA).</p>
  </form>`;}

const CONCEPTS={

/* 01 · BIG CTA SPLIT */
split:{
  label:'01 · Big-CTA Split',
  blurb:'Dunkler Info-Block (Adresse, Route, Telefon, Zeiten, Karte) links + Formular rechts. Klar & funktional (aktuell).',
  motion:'Block reveal-t. „Ohne Termin"-Badge mit Punkt. Karte erst nach Consent.',
  vibe:'Klar · funktional',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <div class="reveal mx-auto grid max-w-6xl overflow-hidden rounded-3xl border border-ink/10 lg:grid-cols-[1.05fr_.95fr]">
      <div class="bg-ink p-7 text-cream sm:p-8">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-orange">Kontakt & Anfahrt</p>
        <h2 class="mt-2 font-serif text-[clamp(1.7rem,1rem+2.4vw,2.6rem)] font-medium leading-tight">Komm vorbei – mitten im Kreuzviertel.</h2>
        <div class="mt-6 space-y-4 text-sm">
          <div><b>${S.street}</b><span class="block text-cream/70">${S.zip} ${S.city} · ${S.district}</span><a href="#" class="mt-1 inline-block font-semibold text-orange hover:underline">Route planen →</a></div>
          <div><a href="#" class="font-semibold hover:underline">${S.phone}</a><span class="block text-cream/70">${S.email}</span></div>
          <div><b>Öffnungszeiten</b><span class="mt-1 block space-y-0.5">${hoursList(true)}</span></div>
        </div>
        <span class="mt-5 inline-flex items-center gap-2 rounded-full bg-orange/20 px-3.5 py-2 text-sm font-semibold text-orange"><span class="h-2 w-2 rounded-full bg-orange"></span>Friseur ohne Termin – einfach reinkommen</span>
        <div class="mt-5 h-44">${mapBox(true)}</div>
      </div>
      <div class="bg-cream2 p-7 sm:p-8"><h3 class="font-serif text-xl font-medium">Schreib uns</h3><p class="mb-5 mt-1 text-sm text-inkSoft">Fragen oder ein Anliegen für einen Anlass? Wir antworten gern.</p>${form(false)}</div>
    </div>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 02 · MAP BACKGROUND + FLOATING CARD */
mapbg:{
  label:'02 · Karte + Floating-Card',
  blurb:'Große Karte als Hintergrund, eine schwebende Kontakt-/Formular-Karte darüber. Premium, modern, „Standort first".',
  motion:'Karte mit pulsierendem Pin, Karte schwebt mit Schatten ein. Klick-to-load (Consent).',
  vibe:'Premium · Standort im Fokus',
  render:()=>`
  <section class="relative px-0 py-0">
    <div class="map relative h-[520px] w-full">
      <div class="absolute left-1/2 top-[38%] -translate-x-1/2"><span class="pin grid h-14 w-14 place-items-center rounded-full bg-terra text-2xl text-white shadow-xl">📍</span></div>
      <div class="reveal absolute inset-x-4 bottom-6 mx-auto max-w-md rounded-3xl bg-white/90 p-7 shadow-2xl backdrop-blur sm:left-10 sm:right-auto sm:bottom-10">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-terra">Kontakt & Anfahrt</p>
        <h2 class="mt-2 font-serif text-2xl font-medium">${S.street}</h2>
        <p class="text-sm text-inkSoft">${S.zip} ${S.city} · ${S.district}</p>
        <div class="mt-3 flex flex-wrap gap-2">
          <a href="#" class="btn inline-flex min-h-[44px] items-center rounded-xl bg-ink px-4 text-sm font-semibold text-cream">Route planen →</a>
          <a href="#" class="btn inline-flex min-h-[44px] items-center rounded-xl border border-ink/15 px-4 text-sm font-semibold">${S.phone}</a>
        </div>
        <div class="mt-4 grid grid-cols-2 gap-x-6 text-xs">${hoursList(false)}</div>
        <span class="mt-3 inline-flex items-center gap-2 text-xs font-semibold text-terra"><span class="h-2 w-2 rounded-full bg-terra"></span>Ohne Termin – einfach reinkommen</span>
      </div>
    </div>
    <div class="bg-cream2 px-7 py-10 sm:px-10"><div class="mx-auto max-w-xl"><h3 class="font-serif text-xl font-medium">Lieber schreiben?</h3><p class="mb-5 mt-1 text-sm text-inkSoft">Wir antworten gern.</p>${form(false)}</div></div>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 03 · CENTERED INFO CARDS */
cards:{
  label:'03 · Zentriert + Info-Cards',
  blurb:'Zentrierte Einladung, drei Info-Karten (Adresse · Telefon · Zeiten) als Reihe, Formular darunter. Aufgeräumt & freundlich.',
  motion:'Karten poppen gestaffelt, Hover-Lift. Großer „Ohne Termin"-Claim.',
  vibe:'Freundlich · aufgeräumt',
  render:()=>`
  <section class="bg-cream px-7 py-14 text-center sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Kontakt & Anfahrt</p>
    <h2 class="reveal mx-auto mt-3 max-w-[20ch] font-serif text-[clamp(1.8rem,1rem+3vw,3rem)] font-medium" style="transition-delay:.06s">Komm vorbei – <span class="italic text-terra">ganz ohne Termin.</span></h2>
    <div class="mx-auto mt-8 grid max-w-4xl gap-4 sm:grid-cols-3">
      <div class="reveal lift rounded-2xl border border-ink/10 bg-cream2 p-6"><span class="text-2xl">📍</span><h3 class="mt-3 font-serif text-lg">${S.street}</h3><p class="text-sm text-inkSoft">${S.zip} ${S.city}</p><a href="#" class="mt-2 inline-block text-sm font-semibold text-terra hover:underline">Route →</a></div>
      <div class="reveal lift rounded-2xl border border-ink/10 bg-cream2 p-6"><span class="text-2xl">📞</span><h3 class="mt-3 font-serif text-lg">${S.phone}</h3><p class="text-sm text-inkSoft">${S.email}</p><a href="#" class="mt-2 inline-block text-sm font-semibold text-terra hover:underline">Anrufen →</a></div>
      <div class="reveal lift rounded-2xl border border-ink/10 bg-cream2 p-6"><span class="text-2xl">🕐</span><h3 class="mt-3 font-serif text-lg">Öffnungszeiten</h3><div class="mt-1 space-y-0.5 text-left text-xs">${hoursList(false)}</div></div>
    </div>
    <div class="mx-auto mt-10 max-w-xl text-left"><h3 class="font-serif text-xl font-medium">Schreib uns</h3><p class="mb-5 mt-1 text-sm text-inkSoft">Fragen oder ein Anliegen für einen Anlass?</p>${form(false)}</div>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 04 · DARK LUXE */
luxe:{
  label:'04 · Dark Luxe Kontakt',
  blurb:'Durchgehend dunkel mit Gold-Akzenten, Karte + Formular elegant. Kohärent zu Hero/Über uns/Team.',
  motion:'Reveal-Stagger, Gold-Hover, pulsierender Pin. Premium & ruhig.',
  vibe:'Luxus · markentreu',
  render:()=>`
  <section class="bg-ink px-7 py-14 text-cream sm:px-10">
    <div class="mx-auto grid max-w-6xl gap-8 lg:grid-cols-2">
      <div>
        <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">Kontakt & Anfahrt</p>
        <h2 class="reveal mt-2 font-serif text-[clamp(1.7rem,1rem+2.4vw,2.6rem)] font-medium" style="transition-delay:.06s">Komm vorbei – mitten im Kreuzviertel.</h2>
        <div class="reveal mt-6 space-y-4 text-sm" style="transition-delay:.12s">
          <div><b>${S.street}</b><span class="block text-cream/70">${S.zip} ${S.city} · ${S.district}</span><a href="#" class="mt-1 inline-block font-semibold text-orange hover:underline">Route planen →</a></div>
          <div><a href="#" class="font-semibold hover:underline">${S.phone}</a><span class="block text-cream/70">${S.email}</span></div>
          <div><b>Öffnungszeiten</b><span class="mt-1 block space-y-0.5">${hoursList(true)}</span></div>
        </div>
        <div class="reveal mt-5 h-48" style="transition-delay:.18s">${mapBox(true)}</div>
      </div>
      <div class="reveal rounded-3xl border border-orange/25 bg-white/5 p-7 sm:p-8" style="transition-delay:.1s"><h3 class="font-serif text-xl font-medium text-orange">Schreib uns</h3><p class="mb-5 mt-1 text-sm text-cream/70">Wir antworten gern – oder komm einfach ohne Termin vorbei.</p>${form(true)}</div>
    </div>
  </section>${filler('dark')}`,
  init:()=>{},
},

/* 05 · WALK-IN FIRST */
walkin:{
  label:'05 · Walk-In First',
  blurb:'Der USP zuerst: riesiger „Ohne Termin"-Claim, große Telefon- & Route-Buttons, Karte prominent – Formular sekundär.',
  motion:'Großer Claim reveal-t, Buttons mit Hover-Lift, Karte mit Pin. Conversion auf „vorbeikommen/anrufen".',
  vibe:'Conversion · Walk-In',
  render:()=>`
  <section class="bg-cream2 px-7 py-14 sm:px-10">
    <div class="mx-auto max-w-5xl text-center">
      <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Friseur ohne Termin</p>
      <h2 class="reveal mt-3 font-serif text-[clamp(2rem,1rem+4vw,3.8rem)] font-medium leading-[1.02]" style="transition-delay:.06s">Einfach reinkommen.<br><span class="italic text-terra">Wir sind für dich da.</span></h2>
      <div class="reveal mt-7 flex flex-wrap justify-center gap-3" style="transition-delay:.14s">
        <a href="#" class="btn inline-flex min-h-[52px] items-center gap-2 rounded-xl bg-terra px-7 font-semibold text-white hover:bg-brownDark">📞 ${S.phone}</a>
        <a href="#" class="btn inline-flex min-h-[52px] items-center gap-2 rounded-xl bg-ink px-7 font-semibold text-cream hover:bg-brownDark">📍 Route planen</a>
      </div>
      <p class="reveal mt-3 text-sm text-inkSoft" style="transition-delay:.2s">${S.street} · ${S.zip} ${S.city} · ${S.district}</p>
    </div>
    <div class="mx-auto mt-8 grid max-w-5xl gap-6 lg:grid-cols-[1.2fr_1fr]">
      <div class="reveal h-72 overflow-hidden rounded-3xl">${mapBox(false)}</div>
      <div class="reveal rounded-3xl border border-ink/10 bg-cream p-6"><div class="grid grid-cols-2 gap-x-6 text-sm">${hoursList(false)}</div><hr class="my-4 border-ink/10"><h3 class="font-serif text-lg font-medium">Lieber schreiben?</h3><div class="mt-3">${form(false)}</div></div>
    </div>
  </section>${filler('light')}`,
  init:()=>{},
},
};

/* ============ SHELL ============ */
function filler(t){const d=t==='dark';return `<section class="${d?'bg-ink text-cream':'bg-cream2 text-ink'} px-6 py-12"><p class="text-center font-serif text-lg ${d?'text-cream/55':'text-inkSoft'}">↑ weiter scrollen</p><div class="h-[22vh]"></div></section>`;}
let io;function wireReveal(vp){if(io)io.disconnect();io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.08});[...vp.querySelectorAll('.reveal')].forEach((el,i)=>{if(!el.style.transitionDelay)el.style.transitionDelay=(i*0.05)+'s';io.observe(el);});}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();wireReveal(vp);requestAnimationFrame(()=>{vp.querySelectorAll('.reveal').forEach(el=>{const r=el.getBoundingClientRect();if(r.top<vp.clientHeight+60)el.classList.add('in');});c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
