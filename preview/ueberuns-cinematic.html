<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salon Muster · Über uns – Cinematic (26–30)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(500px,80vh,880px);overflow-y:auto;overflow-x:hidden;position:relative;background:#0f0b08;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .scene{perspective:1300px}.pre3d{transform-style:preserve-3d}
  .word-mask{overflow:hidden;display:inline-block;vertical-align:top}
  .word-mask>span{display:inline-block;will-change:transform}
  .tcard{will-change:transform;transition:transform .5s var(--eo)}.tcard.live{transition:none}
  .layer{will-change:transform}
  @media (prefers-reduced-motion:reduce){.tcard,.layer,.word-mask>span{transition:none!important;transform:none!important}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Salon Muster · Cinematic</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Über uns — Apple × Awwwards (26–30)</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Cinematische, scroll-getriebene Eleganz mit je einem mutigen Move. <b>Im Fenster scrollen</b> (26, 27, 29) bzw. <b>Maus bewegen</b> (28, 30).</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">salon-muster.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Scroll-getriebene Motion · GPU-only · spring-Lerp · reduce-motion-sicher.</footer>

<script>
const IMG={
  salon:"https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1500&q=80",
  chair:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1300&q=80",
  color:"https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?auto=format&fit=crop&w=1300&q=80",
  detail:"https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=1300&q=80",
  maria:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=1100&q=80",
  man:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=1300&q=80",
};
const QUOTE='Style zu Mensch, passender Look und Zufriedenheit.';
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
const fine=()=>matchMedia('(hover:hover) and (pointer:fine)').matches && !reduced();
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

const CONCEPTS={

/* 26 · HORIZONTAL SCROLL GALLERY */
hscroll:{
  label:'26 · Horizontal Scroll-Galerie',
  blurb:'Vertikales Scrollen schiebt eine horizontale Filmstrip-Galerie eurer Arbeiten durch. Apple-Keynote-Gefühl mit Awwwards-Twist.',
  motion:'Sektion gepinnt; Scroll-Fortschritt übersetzt die Strecke in X (Scrub). Bilder parallaxen leicht im Rahmen, große Nummern/Captions. Butterweich, GPU-only.',
  vibe:'Cinematic · horizontal-pan',
  render:()=>`
  <section class="hs-sec relative bg-[#0f0b08]" style="height:340%">
    <div class="hs-pin sticky top-0 flex h-[100svh] flex-col justify-center overflow-hidden">
      <div class="px-8 pb-6 text-cream"><p class="text-xs font-semibold uppercase tracking-[0.3em] text-orange">Wer wir sind</p><h2 class="mt-2 font-serif text-[clamp(1.6rem,1rem+2.4vw,2.6rem)] font-medium">Handwerk in Bildern</h2></div>
      <div class="hs-track flex gap-6 px-8 will-change-transform">
        ${[[IMG.salon,'01','Unser Salon','Innenstadt · Zentrum'],[IMG.color,'02','Farbe & Balayage','Natürliche Highlights, ab 135 €'],[IMG.chair,'03','Schnitt & Styling','Typgerecht, ehrlich beraten'],[IMG.man,'04','Herren','Klassisch & geradlinig'],[IMG.detail,'05','Detailliebe','Die Kunst des Schneidens']].map(([s,n,t,x])=>`
        <article class="hs-card relative h-[62vh] w-[78vw] shrink-0 overflow-hidden rounded-3xl bg-ink sm:w-[58vw] md:w-[42vw]">
          <img src="${s}" class="hs-img absolute inset-[-6%] h-[112%] w-[112%] object-cover" alt="${t}">
          <div class="absolute inset-0 bg-gradient-to-t from-ink/85 via-ink/10 to-transparent"></div>
          <span class="absolute left-6 top-5 font-serif text-5xl text-cream/30">${n}</span>
          <div class="absolute inset-x-6 bottom-6 text-cream"><h3 class="font-serif text-2xl">${t}</h3><p class="mt-1 text-sm text-cream/70">${x}</p></div>
        </article>`).join('')}
      </div>
      <p class="px-8 pt-6 text-xs text-cream/40">↓ scrollen — die Galerie wandert</p>
    </div>
  </section>${filler('dark')}`,
  init:(vp)=>hscrollInit(vp),
},

/* 27 · PINNED SCALING SHOWCASE */
pinscale:{
  label:'27 · Pinned Scaling Showcase',
  blurb:'Ein Bild wächst beim Scrollen von der Karte fast zum Vollbild, während die Headline Wort für Wort erscheint. Apple-Produktseiten-Feel.',
  motion:'Gepinnt; Scroll skaliert das Bild (0,72→1) + Radius schrumpft. Headline-Wörter steigen gestaffelt nach Fortschritt herein. Kennzahlen faden am Ende ein.',
  vibe:'Apple-clean · keynote',
  render:()=>`
  <section class="ps-sec relative bg-[#0f0b08]" style="height:230%">
    <div class="ps-pin sticky top-0 grid h-[100svh] place-items-center overflow-hidden">
      <div class="ps-imgwrap relative aspect-[16/10] w-[64%] overflow-hidden rounded-[40px] will-change-transform">
        <img src="${IMG.salon}" class="h-full w-full object-cover" alt=""><div class="absolute inset-0 bg-ink/45"></div>
      </div>
      <div class="pointer-events-none absolute inset-0 grid place-items-center text-center text-cream">
        <div>
          <h2 class="font-serif text-[clamp(2rem,1rem+4.5vw,4.2rem)] font-medium leading-[1.04] tracking-tight">
            ${'Mehr als ein Salon.'.split(' ').map(w=>`<span class="word-mask"><span>${w}&nbsp;</span></span>`).join('')}
          </h2>
          <div class="ps-sub mt-5 flex justify-center gap-8 text-cream/80 opacity-0">
            <div><b class="block font-serif text-3xl text-orange">15+</b>Jahre</div>
            <div><b class="block font-serif text-3xl text-orange">4,9★</b>87 Bewertungen</div>
            <div><b class="block font-serif text-3xl text-orange">0€</b>Termin nötig</div>
          </div>
        </div>
      </div>
    </div>
  </section>${filler('dark')}`,
  init:(vp)=>pinscaleInit(vp),
},

/* 28 · KINETIC TYPE + TILT PHOTO */
kinetic:{
  label:'28 · Kinetic Type + Tilt',
  blurb:'Überlebensgroße Outline-Typo „ÜBER UNS", davor ein schwebendes Salonfoto, das dem Cursor folgt. Awwwards-Editorial, clean gehalten.',
  motion:'Riesen-Typo im Hintergrund parallaxt zur Maus. Foto-Karte kippt per Spring-Lerp in 3D mit Tiefenebenen. Ruhig, aber mit Charakter.',
  vibe:'Awwwards-editorial · groß',
  render:()=>`
  <section class="scene relative grid min-h-[clamp(460px,68vh,720px)] place-items-center overflow-hidden bg-[#0f0b08] px-6 text-cream">
    <h2 class="layer pointer-events-none absolute inset-0 grid place-items-center text-center font-serif text-[clamp(4rem,18vw,16rem)] font-semibold leading-none tracking-tighter text-transparent" style="-webkit-text-stroke:1.5px rgba(244,164,96,.35)" data-d="0.5">ÜBER&nbsp;UNS</h2>
    <div class="scene relative">
      <div class="tcard relative aspect-[4/5] w-[clamp(220px,42vw,330px)] overflow-hidden rounded-3xl bg-ink shadow-[0_50px_90px_-30px_rgba(0,0,0,.8)]">
        <img src="${IMG.maria}" class="layer absolute inset-0 h-full w-full object-cover" alt="Maria (Platzhalter)">
        <div class="absolute inset-0 bg-gradient-to-t from-ink/85 via-transparent to-transparent"></div>
        <div class="layer absolute inset-x-5 bottom-5" style="transform:translateZ(50px)"><p class="font-serif text-2xl">Maria</p><p class="text-xs uppercase tracking-[0.25em] text-orange">Friseurmeisterin</p></div>
      </div>
    </div>
    <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-xs text-cream/40">↗ Maus bewegen</p>
  </section>${filler('dark')}`,
  init:(vp)=>kineticInit(vp),
},

/* 29 · SCROLL CROSSFADE STORY */
story:{
  label:'29 · Scroll Crossfade Story',
  blurb:'Gepinnte Bühne: Bilder überblenden sanft beim Scrollen, je Bild eine Story-Zeile. Minimal, cinematisch, sehr „Apple".',
  motion:'Scroll-Fortschritt blendet zwischen Bildern (Ken-Burns) und tauscht die Textzeile. Fortschrittsbalken seitlich. Keine ruckartigen Sprünge.',
  vibe:'Apple-minimal · cinematic',
  render:()=>{const S=[[IMG.salon,'Zentral, gemütlich, entspannend — hier bekommst du den Kopf frei.'],[IMG.chair,'Die fachliche Kunst des Schneidens, Färbens und Verwöhnens.'],[IMG.color,'Natürliche Highlights — Balayage, Ombré, ammoniakfrei auf Wunsch.'],[IMG.man,'Für Herren: die klassische, geradlinige Frisur.']];return `
  <section class="st-sec relative bg-[#0f0b08]" style="height:380%">
    <div class="st-pin sticky top-0 grid h-[100svh] place-items-center overflow-hidden text-center text-cream">
      <div class="absolute inset-0">
        ${S.map((s,i)=>`<img src="${s[0]}" class="st-img absolute inset-0 h-full w-full object-cover transition-opacity duration-700" style="opacity:${i?0:1}" alt="">`).join('')}
        <div class="absolute inset-0 bg-ink/55"></div>
      </div>
      <div class="relative max-w-2xl px-8">
        <p class="text-xs font-semibold uppercase tracking-[0.3em] text-orange">Wer wir sind</p>
        ${S.map((s,i)=>`<p class="st-line font-serif text-[clamp(1.6rem,1rem+2.6vw,2.8rem)] font-medium leading-snug transition-opacity duration-500 ${i?'absolute inset-x-8 opacity-0':''}" data-i="${i}">${s[1]}</p>`).join('')}
      </div>
      <div class="st-bar absolute right-6 top-1/2 h-32 w-1 -translate-y-1/2 overflow-hidden rounded bg-cream/20"><span class="block w-full bg-orange" style="height:0%"></span></div>
    </div>
  </section>${filler('dark')}`;},
  init:(vp)=>storyInit(vp),
},

/* 30 · 3D GALLERY WALL PAN */
wall:{
  label:'30 · 3D Gallery-Wall',
  blurb:'Eine perspektivische Bilderwand; die „Kamera" schwenkt mit Maus/Drag daran entlang. Wie ein Showroom — edel & räumlich.',
  motion:'Wand aus gerahmten Fotos in 3D (translateZ/rotateY). Maus schwenkt die Kamera (translateX + leichtes rotateY) per Spring-Lerp; auch ziehbar.',
  vibe:'Showroom-3D · räumlich-edel',
  render:()=>`
  <section class="scene relative grid min-h-[clamp(460px,66vh,720px)] place-items-center overflow-hidden bg-gradient-to-b from-[#171009] to-[#0f0b08] px-6 text-cream">
    <p class="absolute top-6 left-1/2 -translate-x-1/2 text-xs font-semibold uppercase tracking-[0.3em] text-orange">Galerie</p>
    <div class="wall-cam pre3d relative h-[300px] w-full max-w-4xl">
      <div class="wall pre3d absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
        ${[[IMG.salon,-560,0],[IMG.color,-280,40],[IMG.chair,0,-30],[IMG.detail,280,40],[IMG.man,560,0]].map(([s,x,z])=>`<figure class="wall-fr absolute -translate-x-1/2 -translate-y-1/2 overflow-hidden rounded-2xl border-4 border-[#2a211b] shadow-2xl" style="transform:translate3d(${x}px,0,${z}px) rotateY(${x<0?8:x>0?-8:0}deg);width:230px;height:300px"><img src="${s}" class="h-full w-full object-cover" alt=""></figure>`).join('')}
      </div>
    </div>
    <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-xs text-cream/40">↔ Maus bewegen / ziehen</p>
  </section>${filler('dark')}`,
  init:(vp)=>wallInit(vp),
},
};

/* ============ ENGINES ============ */
function hscrollInit(vp){
  const sec=vp.querySelector('.hs-sec'),pin=vp.querySelector('.hs-pin'),track=vp.querySelector('.hs-track'),imgs=[...vp.querySelectorAll('.hs-img')];
  if(!sec)return; pin.style.height=vp.clientHeight+'px';
  const run=()=>{const total=sec.offsetHeight-vp.clientHeight;const p=clamp((vp.scrollTop-sec.offsetTop)/total,0,1);
    const max=track.scrollWidth-vp.clientWidth+0; track.style.transform=`translateX(${-(p*max)}px)`;
    if(!reduced())imgs.forEach(im=>{const r=im.parentElement.getBoundingClientRect();const c=(r.left+r.width/2-vp.clientWidth/2)/vp.clientWidth;im.style.transform=`translateX(${(-c*30).toFixed(1)}px)`;});};
  vp.addEventListener('scroll',()=>requestAnimationFrame(run),{passive:true});run();
}
function pinscaleInit(vp){
  const sec=vp.querySelector('.ps-sec'),pin=vp.querySelector('.ps-pin'),wrap=vp.querySelector('.ps-imgwrap'),words=[...vp.querySelectorAll('.word-mask>span')],sub=vp.querySelector('.ps-sub');
  if(!sec)return; pin.style.height=vp.clientHeight+'px';
  words.forEach(w=>{w.style.transform='translateY(110%)';w.style.transition='transform .6s var(--eo)';});
  const run=()=>{const total=sec.offsetHeight-vp.clientHeight;const p=clamp((vp.scrollTop-sec.offsetTop)/total,0,1);
    if(reduced()){wrap.style.transform='none';words.forEach(w=>w.style.transform='none');sub.style.opacity=1;return;}
    const sc=lerp(0.72,1,clamp(p/0.8,0,1)); wrap.style.transform=`scale(${sc.toFixed(3)})`; wrap.style.borderRadius=lerp(40,12,p)+'px';
    words.forEach((w,i)=>{const th=0.12+i*0.1; w.style.transform=p>th?'translateY(0)':'translateY(110%)';});
    sub.style.opacity=clamp((p-0.62)/0.25,0,1).toFixed(2); sub.style.transform=`translateY(${(12*(1-clamp((p-0.62)/0.25,0,1))).toFixed(1)}px)`;};
  vp.addEventListener('scroll',()=>requestAnimationFrame(run),{passive:true});run();
}
function kineticInit(vp){
  const card=vp.querySelector('.tcard'),ls=[...vp.querySelectorAll('.layer')]; if(!card)return;
  if(!fine()){return;}
  let tx=0,ty=0,cx=0,cy=0,raf=null,active=false;
  const loop=()=>{cx=lerp(cx,tx,0.1);cy=lerp(cy,ty,0.1);
    card.style.transform=`rotateX(${(-cy*12).toFixed(2)}deg) rotateY(${(cx*16).toFixed(2)}deg)`;
    ls.forEach(l=>{const d=+(l.getAttribute('data-d')||0);if(d)l.style.transform=`translate(${(cx*d*40).toFixed(1)}px,${(cy*d*40).toFixed(1)}px)`;});
    if(active||Math.abs(cx-tx)>0.002||Math.abs(cy-ty)>0.002)raf=requestAnimationFrame(loop);else raf=null;};
  card.classList.add('live');
  vp.querySelector('section').addEventListener('mousemove',e=>{const r=vp.getBoundingClientRect();tx=(e.clientX-r.left)/r.width-0.5;ty=(e.clientY-r.top)/r.height-0.5;active=true;if(!raf)raf=requestAnimationFrame(loop);});
  vp.querySelector('section').addEventListener('mouseleave',()=>{tx=0;ty=0;active=false;if(!raf)raf=requestAnimationFrame(loop);});
}
function storyInit(vp){
  const sec=vp.querySelector('.st-sec'),pin=vp.querySelector('.st-pin'),imgs=[...vp.querySelectorAll('.st-img')],lines=[...vp.querySelectorAll('.st-line')],bar=vp.querySelector('.st-bar span');
  if(!sec)return; pin.style.height=vp.clientHeight+'px'; const N=imgs.length;
  const run=()=>{const total=sec.offsetHeight-vp.clientHeight;const p=clamp((vp.scrollTop-sec.offsetTop)/total,0,1);
    bar.style.height=(p*100)+'%'; const idx=Math.min(N-1,Math.floor(p*N+0.0001));
    imgs.forEach((im,i)=>im.style.opacity=i===idx?1:0); lines.forEach((ln,i)=>ln.style.opacity=i===idx?1:0);};
  vp.addEventListener('scroll',()=>requestAnimationFrame(run),{passive:true});run();
}
function wallInit(vp){
  const cam=vp.querySelector('.wall'); if(!cam)return; if(!fine()){cam.style.transform='translateZ(-120px)';return;}
  let tx=0,cx=0,raf=null,active=false,dragging=false,lastX=0;
  const loop=()=>{cx=lerp(cx,tx,0.09); cam.style.transform=`translateZ(-120px) translateX(${(cx).toFixed(1)}px) rotateY(${(-cx*0.02).toFixed(2)}deg)`;
    if(active||Math.abs(cx-tx)>0.2)raf=requestAnimationFrame(loop);else raf=null;};
  vp.querySelector('section').addEventListener('mousemove',e=>{const r=vp.getBoundingClientRect();tx=-((e.clientX-r.left)/r.width-0.5)*640;active=true;if(!raf)raf=requestAnimationFrame(loop);});
  vp.querySelector('section').addEventListener('mouseleave',()=>{active=false;});
  vp.querySelector('section').addEventListener('pointerdown',e=>{dragging=true;lastX=e.clientX;});
  window.addEventListener('pointermove',e=>{if(!dragging)return;tx=clamp(tx+(e.clientX-lastX),-640,640);lastX=e.clientX;active=true;if(!raf)raf=requestAnimationFrame(loop);});
  window.addEventListener('pointerup',()=>dragging=false);
}

/* ============ SHELL ============ */
function filler(t){const d=t==='dark';return `<section class="${d?'bg-[#0f0b08] text-cream':'bg-cream2 text-ink'} px-6 py-14"><p class="text-center font-serif text-xl ${d?'text-cream/55':'text-inkSoft'}">↑ weiter scrollen</p><div class="h-[40vh]"></div></section>`;}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();requestAnimationFrame(()=>{c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
