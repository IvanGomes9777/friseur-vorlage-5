<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salon Muster · Leistungen – 5 Konzepte</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(480px,78vh,860px);overflow-y:auto;overflow-x:hidden;position:relative;background:#F9F6F2;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s var(--eo),transform .7s var(--eo)}.reveal.in{opacity:1;transform:none}
  .lift{transition:transform .3s var(--eo),box-shadow .3s var(--eo)}.lift:hover{transform:translateY(-4px);box-shadow:0 24px 50px -28px rgba(42,33,27,.5)}
  .acc-body{overflow:hidden;transition:max-height .5s var(--eo)}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important}.acc-body{transition:none}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Salon Muster · Relaunch</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Sektion 04 — Leistungen & Preise</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Fünf Richtungen für die Preisliste. Tab wählen, im Fenster scrollen/klicken. Echte Preise aus dem Salon.</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">salon-muster.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Echte Preise · Balayage ab 135 € als Spezialität · Farben &amp; Fonts aus dem Projekt.</footer>

<script>
const DATA={
  damen:{label:'Damen',intro:'Individuell und modebewusst – traditionelle Technik in Schnitt und Farbe, kombiniert mit aktuellen Trends.',groups:[
    {title:'Schnitt & Styling',items:[['Waschen · Schneiden · Föhnen','39,00 €'],['Anfeuchten · Schneiden','28,00 €'],['Pony schneiden','8,00 €'],['Dauerwelle','ab 49,00 €'],['Hochsteckfrisur','ab 45,00 €']]},
    {title:'Farbe & Tönung',items:[['Haarfärbung (Neu)','ab 39,00 €'],['Ansatz (bis 2 cm)','ab 35,00 €'],['Tönung','ab 28,00 €'],['Balayage','ab 135,00 €',1],['Pastelltoncoloration','ab 25,00 €']]},
    {title:'Strähnen',items:[['Foliensträhnen Oberkopf','ab 45,00 €'],['Ganzer Kopf','ab 55,00 €'],['Lang','ab 61,00 €']]},
  ]},
  herren:{label:'Herren',intro:'Typgerechte, pflegeleichte Business-Frisuren für die City – Schnitt, Pflege, Strähnen und Grauhaarabdeckung.',groups:[
    {title:'Schnitt & Bart',items:[['Waschen · Schneiden · Föhnen','28,00 €'],['Anfeuchten · Schneiden','20,00 €'],['Maschinenschnitt','16,00 €'],['Konturenschnitt','15,00 €'],['Bart schneiden','8,00 €']]},
    {title:'Farbe & Strähnen',items:[['Haarfärbung','ab 35,00 €'],['Strähnen','ab 21,00 €'],['Foliensträhnen','ab 45,00 €']]},
  ]},
  kinder:{label:'Kinder',intro:'Kinderfriseur für junge Leute – trendig, modern, altersgerecht. Eigene Spielecke. Bis 14 Jahre.',groups:[
    {title:'',items:[['Haarschnitt bis 14 Jahre','18,00 €'],['Waschen · Schneiden · Föhnen','ab 25,00 €']]},
  ]},
};
const OCC={kick:'Besondere Anlässe',title:'Frisuren für Deinen schönsten Tag',text:'Hochzeit, Theater, Business, Weihnachts- & Abschlussfeiern – passend zum Anlass und zum Kleid.',price:'Hochsteckfrisur ab 45 € · nach Aufwand'};
const cats=Object.keys(DATA);
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
const num=p=>parseFloat(p.replace(/[^0-9,]/g,'').replace(',','.'))||0;

const CONCEPTS={

/* 1 · TABBED PRICE LIST */
tabbed:{
  label:'01 · Tabbed Preisliste',
  blurb:'Klar & vertraut: Tabs Damen/Herren/Kinder, Leader-Dot-Zeilen, Info-Box, Anlässe-Block. Die sichere, lesbare Bank.',
  motion:'Tab-Wechsel faded das Panel ein. Zeilen erscheinen gestaffelt. Balayage als Spezialität hervorgehoben.',
  vibe:'Klassisch-klar · maximale Lesbarkeit',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Unsere Leistungen</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Klare Preise, ehrlich kalkuliert.</h2>
    <div class="reveal mt-5 inline-flex flex-wrap gap-1.5 rounded-full bg-cream p-1.5" id="t-tabs" style="transition-delay:.14s"></div>
    <div id="t-panel" class="mt-6"></div>
    ${occBlock()}
  </section>${filler('light')}`,
  init:(vp)=>{ const tabs=vp.querySelector('#t-tabs'),panel=vp.querySelector('#t-panel'); let a=cats[0];
    const paint=()=>{ tabs.innerHTML=cats.map(c=>`<button data-c="${c}" class="min-h-[40px] rounded-full px-5 text-sm font-semibold transition-colors ${c===a?'bg-white text-ink shadow':'text-inkSoft hover:text-ink'}">${DATA[c].label}</button>`).join('');
      tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{a=b.dataset.c;paint();});
      const cat=DATA[a]; panel.innerHTML=`<p class="mb-5 max-w-[58ch] font-serif text-lg italic text-brownDark">${cat.intro}</p><div class="grid gap-x-10 gap-y-6 sm:grid-cols-2">${cat.groups.map(g=>`<div class="${cat.groups.length===1?'sm:col-span-2':''}">${g.title?`<h3 class="mb-1 text-sm font-semibold uppercase tracking-wider text-terra">${g.title}</h3>`:''}${g.items.map(rowDots).join('')}</div>`).join('')}</div><p class="mt-6 text-sm text-inkSoft">„ab"-Preise sind Richtwerte – genauer Preis je nach Haarlänge &amp; Aufwand.</p>`;
    }; paint(); },
},

/* 2 · ACCORDION */
accordion:{
  label:'02 · Accordion-Kategorien',
  blurb:'Große aufklappbare Kategorie-Panels mit Foto-Akzent. Eines offen – ruhig, mobil top, sehr aufgeräumt.',
  motion:'Sanftes Aufklappen (max-height), Chevron dreht. Beim Öffnen erscheinen die Preisgruppen. Andere schließen automatisch.',
  vibe:'Aufgeräumt · mobil-stark',
  render:()=>`
  <section class="bg-cream px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Unsere Leistungen</p>
    <h2 class="reveal mt-3 mb-7 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Wähl deine Kategorie.</h2>
    <div class="space-y-3">
      ${cats.map((c,i)=>`<div class="acc overflow-hidden rounded-2xl border border-ink/10 bg-cream2">
        <button class="acc-head flex w-full items-center justify-between gap-4 px-6 py-5 text-left" data-c="${c}">
          <span class="font-serif text-2xl font-medium">${DATA[c].label}</span>
          <span class="acc-chev grid h-8 w-8 place-items-center rounded-full bg-terra/15 text-terra transition-transform">⌄</span>
        </button>
        <div class="acc-body" style="max-height:0"><div class="px-6 pb-6"><p class="mb-4 max-w-[58ch] font-serif italic text-brownDark">${DATA[c].intro}</p><div class="grid gap-x-10 gap-y-5 sm:grid-cols-2">${DATA[c].groups.map(g=>`<div class="${DATA[c].groups.length===1?'sm:col-span-2':''}">${g.title?`<h3 class="mb-1 text-sm font-semibold uppercase tracking-wider text-terra">${g.title}</h3>`:''}${g.items.map(rowDots).join('')}</div>`).join('')}</div></div></div>
      </div>`).join('')}
    </div>
    ${occBlock()}
  </section>${filler('light')}`,
  init:(vp)=>{ const accs=[...vp.querySelectorAll('.acc')];
    const open=el=>{ accs.forEach(a=>{const b=a.querySelector('.acc-body'),ch=a.querySelector('.acc-chev');if(a===el){b.style.maxHeight=b.scrollHeight+'px';ch.style.transform='rotate(180deg)';}else{b.style.maxHeight='0';ch.style.transform='';}}); };
    accs.forEach(a=>a.querySelector('.acc-head').onclick=()=>{const b=a.querySelector('.acc-body');b.style.maxHeight&&b.style.maxHeight!=='0px'?(b.style.maxHeight='0',a.querySelector('.acc-chev').style.transform=''):open(a);});
    open(accs[0]); },
},

/* 3 · MENU CARDS */
cards:{
  label:'03 · Menu-Cards',
  blurb:'Leistungen als „Speisekarte" aus Karten je Gruppe, Balayage als hervorgehobene Spezialität. Modern, übersichtlich.',
  motion:'Karten poppen gestaffelt herein, Hover-Lift. Kategorie-Umschalter oben. Spezialität mit Akzentrahmen.',
  vibe:'Modern · menü-haft',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Unsere Leistungen</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Unsere Karte.</h2>
    <div class="reveal mt-5 inline-flex flex-wrap gap-1.5 rounded-full bg-cream p-1.5" id="c-tabs" style="transition-delay:.14s"></div>
    <div id="c-grid" class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>
    ${occBlock()}
  </section>${filler('light')}`,
  init:(vp)=>{ const tabs=vp.querySelector('#c-tabs'),grid=vp.querySelector('#c-grid'); let a=cats[0];
    const paint=()=>{ tabs.innerHTML=cats.map(c=>`<button data-c="${c}" class="min-h-[40px] rounded-full px-5 text-sm font-semibold transition-colors ${c===a?'bg-white text-ink shadow':'text-inkSoft hover:text-ink'}">${DATA[c].label}</button>`).join('');
      tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{a=b.dataset.c;paint();});
      grid.innerHTML=DATA[a].groups.map(g=>`<article class="reveal in lift rounded-2xl border border-ink/10 bg-white p-5"><h3 class="font-serif text-lg font-medium text-terra">${g.title||DATA[a].label}</h3><div class="mt-3">${g.items.map(([n,p,f])=>`<div class="flex items-baseline justify-between gap-3 border-b border-dashed border-ink/12 py-1.5 ${f?'rounded-lg bg-orange/10 px-2 -mx-2':''}"><span class="text-sm ${f?'font-semibold':''}">${n}${f?' <span class="text-[0.65rem] uppercase tracking-wider text-terra">Spezialität</span>':''}</span><span class="whitespace-nowrap text-sm font-semibold tabular-nums text-brownDark">${p}</span></div>`).join('')}</div></article>`).join('');
    }; paint(); },
},

/* 4 · DARK LUXE MENU */
luxe:{
  label:'04 · Dark Luxe Menu',
  blurb:'Edle „Restaurant-Karte" auf dunklem Grund mit Gold-Leadern. Kohärent zu Navbar/Hero/Über uns. Premium.',
  motion:'Kategorie-Pills. Zeilen mit goldenen Punkt-Leadern erscheinen gestaffelt. Balayage in Gold hervorgehoben.',
  vibe:'Luxus / High-End · markentreu',
  render:()=>`
  <section class="bg-ink px-7 py-14 text-cream sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">Unsere Leistungen</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Die Karte aus Meisterhand</h2>
    <div class="reveal mt-5 inline-flex flex-wrap gap-1.5 rounded-full border border-white/15 p-1.5" id="l-tabs" style="transition-delay:.14s"></div>
    <div id="l-panel" class="mt-7"></div>
    ${occBlock(true)}
  </section>${filler('dark')}`,
  init:(vp)=>{ const tabs=vp.querySelector('#l-tabs'),panel=vp.querySelector('#l-panel'); let a=cats[0];
    const paint=()=>{ tabs.innerHTML=cats.map(c=>`<button data-c="${c}" class="min-h-[40px] rounded-full px-5 text-sm font-semibold transition-colors ${c===a?'bg-orange text-ink':'text-cream/70 hover:text-orange'}">${DATA[c].label}</button>`).join('');
      tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{a=b.dataset.c;paint();});
      panel.innerHTML=`<p class="mb-6 max-w-[58ch] font-serif text-lg italic text-orange/85">${DATA[a].intro}</p><div class="grid gap-x-12 gap-y-7 sm:grid-cols-2">${DATA[a].groups.map(g=>`<div class="${DATA[a].groups.length===1?'sm:col-span-2':''}">${g.title?`<h3 class="mb-2 text-sm font-semibold uppercase tracking-wider text-orange/80">${g.title}</h3>`:''}${g.items.map(rowGold).join('')}</div>`).join('')}</div>`;
    }; paint(); },
},

/* 5 · FILTER + ESTIMATOR */
estimator:{
  label:'05 · Filter + Richtwert',
  blurb:'Interaktiv: Leistungen anklicken → „Mein Besuch" rechnet live einen Richtwert. App-haft, Awwwards-modern.',
  motion:'Kategorie-Chips filtern die Liste. Tippen auf eine Leistung legt sie in die Summe (animierter Zähler). Transparent &amp; spielerisch.',
  vibe:'Interaktiv · conversion-orientiert',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Stell dir deinen Besuch zusammen</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Was darf's sein?</h2>
    <div class="reveal mt-5 inline-flex flex-wrap gap-1.5 rounded-full bg-cream p-1.5" id="e-tabs" style="transition-delay:.14s"></div>
    <div class="mt-6 grid gap-6 lg:grid-cols-[1.6fr_1fr]">
      <div id="e-list" class="space-y-2"></div>
      <aside class="sticky top-4 h-fit rounded-2xl border border-terra/25 bg-white p-6">
        <p class="text-xs font-semibold uppercase tracking-wider text-terra">Mein Besuch (Richtwert)</p>
        <p class="mt-2 font-serif text-4xl font-semibold tabular-nums text-ink"><span id="e-sum">0,00</span> €</p>
        <ul id="e-picked" class="mt-4 space-y-1 text-sm text-inkSoft"></ul>
        <p class="mt-4 text-xs text-inkSoft">Unverbindlicher Richtwert. Endpreis je nach Haarlänge &amp; Aufwand – ohne Termin vorbeikommen.</p>
        <a href="#" class="btn mt-4 inline-flex min-h-[44px] w-full items-center justify-center rounded-xl bg-terra px-5 font-semibold text-white">Einfach vorbeikommen</a>
      </aside>
    </div>
  </section>${filler('light')}`,
  init:(vp)=>estimatorInit(vp),
},
};

/* ============ HELPERS ============ */
function rowDots([n,p,f]){return `<div class="flex items-baseline gap-3 border-b border-dashed border-ink/15 py-2 ${f?'rounded-lg bg-orange/10 px-2 -mx-2':''}"><span class="font-medium text-ink">${n}${f?' <span class="ml-1 rounded-full bg-terra px-2 py-0.5 text-[0.6rem] font-bold uppercase text-white">Spezialität</span>':''}</span><span class="-translate-y-1 flex-1 border-b border-dotted border-ink/25"></span><span class="whitespace-nowrap font-semibold tabular-nums text-brownDark">${p}</span></div>`;}
function rowGold([n,p,f]){return `<div class="flex items-baseline gap-3 py-2.5 ${f?'rounded-lg bg-orange/10 px-2 -mx-2':''}"><span class="${f?'font-semibold text-orange':'text-cream/90'}">${n}</span><span class="-translate-y-1 flex-1 border-b border-dotted border-orange/30"></span><span class="whitespace-nowrap font-semibold tabular-nums ${f?'text-orange':'text-cream'}">${p}</span></div>`;}
function occBlock(dark){return `<div class="mt-7 overflow-hidden rounded-2xl ${dark?'border border-orange/30 bg-white/5':'bg-gradient-to-br from-brown to-brownDark text-cream'} p-6 sm:p-7"><div class="grid items-center gap-6 sm:grid-cols-[1.4fr_1fr]"><div><p class="text-xs font-semibold uppercase tracking-[0.22em] text-orange">${OCC.kick}</p><h3 class="mt-2 font-serif text-2xl font-medium ${dark?'text-cream':''}">${OCC.title}</h3><p class="mt-3 text-sm leading-relaxed ${dark?'text-cream/80':'text-cream/85'}">${OCC.text}</p></div><div class="rounded-xl border ${dark?'border-orange/30':'border-white/20 bg-white/10'} p-6 text-center"><p class="font-serif text-lg ${dark?'text-orange':''}">${OCC.price}</p><a href="#" class="btn mt-4 inline-flex min-h-[44px] items-center justify-center rounded-xl ${dark?'bg-orange text-ink':'bg-cream text-ink'} px-6 font-semibold">Beratung anfragen</a></div></div></div>`;}

function estimatorInit(vp){
  const tabs=vp.querySelector('#e-tabs'),list=vp.querySelector('#e-list'),sumEl=vp.querySelector('#e-sum'),picked=vp.querySelector('#e-picked');
  let a=cats[0]; const sel=new Map();
  const render=()=>{ tabs.innerHTML=cats.map(c=>`<button data-c="${c}" class="min-h-[40px] rounded-full px-5 text-sm font-semibold transition-colors ${c===a?'bg-white text-ink shadow':'text-inkSoft hover:text-ink'}">${DATA[c].label}</button>`).join('');
    tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{a=b.dataset.c;render();});
    list.innerHTML=DATA[a].groups.flatMap(g=>g.items).map(([n,p,f])=>{const on=sel.has(n);return `<button data-n="${n}" data-p="${p}" class="e-item flex w-full items-center gap-3 rounded-xl border ${on?'border-terra bg-terra/10':'border-ink/10 bg-white'} px-4 py-3 text-left transition-colors"><span class="grid h-6 w-6 place-items-center rounded-full ${on?'bg-terra text-white':'bg-ink/10 text-ink'} text-sm">${on?'✓':'+'}</span><span class="flex-1 text-sm font-medium ${f?'text-terra':''}">${n}</span><span class="text-sm font-semibold tabular-nums text-brownDark">${p}</span></button>`;}).join('');
    list.querySelectorAll('.e-item').forEach(b=>b.onclick=()=>{const n=b.dataset.n;sel.has(n)?sel.delete(n):sel.set(n,num(b.dataset.p));render();update();}); };
  const update=()=>{ const tgt=[...sel.values()].reduce((a,b)=>a+b,0);
    picked.innerHTML=sel.size?[...sel.keys()].map(n=>`<li>· ${n}</li>`).join(''):'<li class="opacity-60">Noch nichts gewählt …</li>';
    if(reduced()){sumEl.textContent=tgt.toFixed(2).replace('.',',');return;}
    let cur=parseFloat(sumEl.textContent.replace(',','.'))||0,t0;const step=t=>{t0=t0||t;const p=Math.min((t-t0)/400,1);const v=cur+(tgt-cur)*(1-Math.pow(1-p,3));sumEl.textContent=v.toFixed(2).replace('.',',');if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step); };
  render(); update();
}

/* ============ SHELL ============ */
function filler(t){const d=t==='dark';return `<section class="${d?'bg-ink text-cream':'bg-cream2 text-ink'} px-6 py-12"><p class="text-center font-serif text-lg ${d?'text-cream/55':'text-inkSoft'}">↑ weiter scrollen</p><div class="h-[30vh]"></div></section>`;}
let io;
function wireReveal(vp){if(io)io.disconnect();io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.12});vp.querySelectorAll('.reveal').forEach(el=>io.observe(el));}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();wireReveal(vp);requestAnimationFrame(()=>{vp.querySelectorAll('.reveal').forEach(el=>{const r=el.getBoundingClientRect();if(r.top<vp.clientHeight+40)el.classList.add('in');});c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
