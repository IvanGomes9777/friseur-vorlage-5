<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salon Muster · Footer – 5 Konzepte</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
    keyframes:{pr:{"0%":{boxShadow:"0 0 0 0 rgba(155,230,160,.7)"},"70%":{boxShadow:"0 0 0 7px rgba(155,230,160,0)"},"100%":{boxShadow:"0 0 0 0 rgba(155,230,160,0)"}}},animation:{pr:"pr 2s infinite"},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(480px,78vh,860px);overflow-y:auto;overflow-x:hidden;position:relative;background:#F9F6F2;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .ul{position:relative}.ul::after{content:"";position:absolute;left:0;bottom:-2px;height:1px;width:0;background:#F4A460;transition:width .3s var(--eo)}.ul:hover::after{width:100%}
  .map{background:repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,transparent 1px 26px),repeating-linear-gradient(90deg,rgba(255,255,255,.05) 0 1px,transparent 1px 26px),linear-gradient(135deg,#241b14,#15100b)}
  @media (prefers-reduced-motion:reduce){.animate-pr{animation:none!important}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Salon Muster · Relaunch</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Sektion 10 — Footer</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Fünf Richtungen für den Abschluss. Echte Standortdaten · Impressum & Datenschutz immer enthalten.</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">salon-muster.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Echte Daten · Impressum/Datenschutz · Live-Öffnungsstatus.</footer>

<script>
const S={street:'Musterstraße 12',zip:'12345',city:'Musterstadt',district:'Innenstadt · Zentrum',phone:'01234 567890',email:'info@salon-muster.de',
  hours:[['Montag','Ruhetag'],['Dienstag – Freitag','08:30 – 18:00'],['Samstag','08:00 – 13:00'],['Sonntag','geschlossen']]};
const NAV=['Über uns','Leistungen','Team','Galerie','Bewertungen','FAQ','Kontakt'];
const year=new Date().getFullYear();
// Live-Status
function status(){const n=new Date();const d=n.getDay();const m=n.getHours()*60+n.getMinutes();const sched={2:[510,1080],3:[510,1080],4:[510,1080],5:[510,1080],6:[480,780]};const t=sched[d];if(t&&m>=t[0]&&m<t[1]){const h=Math.floor(t[1]/60),mm=String(t[1]%60).padStart(2,'0');return{open:true,until:`${h}:${mm}`};}return{open:false};}
const st=status();
const statusPill=(d)=>`<span class="inline-flex items-center gap-2 rounded-full ${d?'bg-white/10':'bg-ink/5'} px-3 py-1.5 text-xs font-semibold ${st.open?'text-[#7fd089]':'text-orange'}"><span class="h-2 w-2 rounded-full ${st.open?'bg-[#7fd089] animate-pr':'bg-orange'}"></span>${st.open?`Jetzt geöffnet · bis ${st.until}`:'Geschlossen · Di–Fr ab 8:30'}</span>`;
const logo=(dark)=>`<span class="inline-block rounded-xl ${dark?'bg-white':'bg-ink'} px-3 py-2"><span class="font-serif text-lg font-semibold tracking-wide ${dark?'text-ink':'text-cream'}">SALON MUSTER</span></span>`;
const legalBar=(d)=>`<div class="border-t ${d?'border-white/10':'border-ink/10'}"><div class="mx-auto flex max-w-6xl flex-col gap-3 px-7 py-5 text-xs ${d?'text-cream/60':'text-inkSoft'} sm:flex-row sm:items-center sm:justify-between lg:px-10"><p>© ${year} Salon Muster · Maria Musterfrau. Alle Rechte vorbehalten.</p><nav class="flex gap-5"><a href="#" class="ul hover:${d?'text-cream':'text-ink'}">Impressum</a><a href="#" class="ul hover:${d?'text-cream':'text-ink'}">Datenschutz</a></nav></div></div>`;

const CONCEPTS={

/* 01 · CLASSIC 3-COL */
classic:{
  label:'01 · Klassisch 3-Spalten',
  blurb:'Logo + Intro · Navigation · Kontakt, darunter Recht-Leiste. Vertraut, vollständig (aktuell).',
  motion:'Dezente Hover-Unterstriche (Gold). Live-Öffnungsstatus.',
  vibe:'Vollständig · klassisch',
  render:()=>`
  <footer class="bg-ink text-cream">
    <div class="mx-auto grid max-w-6xl gap-10 px-7 py-12 sm:grid-cols-3 lg:px-10">
      <div>${logo(true)}<p class="mt-4 max-w-[30ch] text-sm text-cream/70">Friseurmeisterbetrieb im Innenstadt Musterstadt – Damen, Herren &amp; Kinder, ohne Termin.</p><div class="mt-4">${statusPill(true)}</div></div>
      <nav><h2 class="text-xs font-semibold uppercase tracking-wider text-cream/50">Entdecken</h2><ul class="mt-3 space-y-2 text-sm">${NAV.map(n=>`<li><a href="#" class="ul text-cream/80 hover:text-orange">${n}</a></li>`).join('')}</ul></nav>
      <div><h2 class="text-xs font-semibold uppercase tracking-wider text-cream/50">Kontakt</h2><address class="mt-3 space-y-1 text-sm not-italic text-cream/80"><p>${S.street}<br>${S.zip} ${S.city}</p><p><a href="#" class="ul hover:text-orange">${S.phone}</a></p><p><a href="#" class="ul hover:text-orange">${S.email}</a></p><p><a href="#" class="ul hover:text-orange">Route planen →</a></p></address></div>
    </div>${legalBar(true)}
  </footer>`,
},

/* 02 · BIG CTA */
cta:{
  label:'02 · Big-CTA Footer',
  blurb:'Großes „Komm vorbei – ohne Termin"-Band ganz oben + Spalten darunter. Lenkt zum Schluss noch zum Besuch.',
  motion:'CTA-Band mit Hover-Lift-Buttons, Live-Status, Hover-Unterstriche.',
  vibe:'Conversion · starker Abschluss',
  render:()=>`
  <footer class="bg-ink text-cream">
    <div class="border-b border-white/10 bg-gradient-to-br from-brown to-brownDark">
      <div class="mx-auto flex max-w-6xl flex-col items-start justify-between gap-5 px-7 py-10 sm:flex-row sm:items-center lg:px-10">
        <div><h2 class="font-serif text-[clamp(1.6rem,1rem+2.2vw,2.4rem)] font-medium">Komm vorbei – ganz ohne Termin.</h2><p class="mt-1 text-cream/80">${S.street} · ${S.district}</p></div>
        <div class="flex flex-wrap gap-3"><a href="#" class="btn inline-flex min-h-[50px] items-center rounded-xl bg-cream px-6 font-semibold text-ink hover:scale-[1.03]">📍 Route planen</a><a href="#" class="btn inline-flex min-h-[50px] items-center rounded-xl border border-cream/40 px-6 font-semibold text-cream hover:bg-cream hover:text-ink">📞 ${S.phone}</a></div>
      </div>
    </div>
    <div class="mx-auto grid max-w-6xl gap-10 px-7 py-10 sm:grid-cols-3 lg:px-10">
      <div>${logo(true)}<div class="mt-4">${statusPill(true)}</div></div>
      <nav><h2 class="text-xs font-semibold uppercase tracking-wider text-cream/50">Entdecken</h2><ul class="mt-3 grid grid-cols-2 gap-2 text-sm">${NAV.map(n=>`<li><a href="#" class="ul text-cream/80 hover:text-orange">${n}</a></li>`).join('')}</ul></nav>
      <div><h2 class="text-xs font-semibold uppercase tracking-wider text-cream/50">Öffnungszeiten</h2><div class="mt-3 space-y-0.5 text-sm text-cream/80">${S.hours.map(([a,b])=>`<span class="flex justify-between gap-4"><span>${a}</span><span>${b}</span></span>`).join('')}</div></div>
    </div>${legalBar(true)}
  </footer>`,
},

/* 03 · GIANT WORDMARK */
giant:{
  label:'03 · Riesen-Wortmarke',
  blurb:'Überlebensgroßes „SALON MUSTER" als Abschluss, Gold-Akzente, minimalistische Links. Editorial & markant.',
  motion:'Wortmarke als Blickfang, Live-Status, Hover-Unterstriche. Sehr „Brand".',
  vibe:'Editorial-bold · markant',
  render:()=>`
  <footer class="overflow-hidden bg-ink text-cream">
    <div class="mx-auto max-w-6xl px-7 pt-12 lg:px-10">
      <div class="flex flex-wrap items-end justify-between gap-6">
        <div>${statusPill(true)}<p class="mt-3 max-w-[34ch] text-sm text-cream/70">Friseurmeisterbetrieb im Innenstadt Musterstadt – ohne Termin.</p></div>
        <div class="text-right text-sm text-cream/80"><p>${S.street} · ${S.zip} ${S.city}</p><a href="#" class="ul hover:text-orange">${S.phone}</a> · <a href="#" class="ul hover:text-orange">${S.email}</a></div>
      </div>
      <nav class="mt-8 flex flex-wrap gap-x-6 gap-y-2 text-sm">${NAV.map(n=>`<a href="#" class="ul text-cream/75 hover:text-orange">${n}</a>`).join('')}</nav>
    </div>
    <div class="pointer-events-none mt-6 select-none px-4 text-center"><span class="font-serif text-[clamp(3rem,17vw,15rem)] font-semibold leading-none tracking-tight text-transparent" style="-webkit-text-stroke:1.5px rgba(244,164,96,.4)">HAIR&nbsp;POWER</span></div>
    ${legalBar(true)}
  </footer>`,
},

/* 04 · MAP FOOTER */
map:{
  label:'04 · Standort-Footer',
  blurb:'Mini-Karte + Öffnungszeiten + Kontakt nebeneinander – Standort im Fokus zum Abschluss.',
  motion:'Karte mit Pin, Live-Status, Hover-Unterstriche.',
  vibe:'Standort-fokussiert',
  render:()=>`
  <footer class="bg-ink text-cream">
    <div class="mx-auto grid max-w-6xl gap-8 px-7 py-12 lg:grid-cols-[1.1fr_1fr] lg:px-10">
      <div class="map relative grid min-h-[220px] place-items-center overflow-hidden rounded-2xl border border-white/10"><span class="grid h-12 w-12 place-items-center rounded-full bg-terra text-2xl text-white shadow-lg">📍</span><span class="absolute bottom-3 left-3 rounded-full bg-white/85 px-3 py-1 text-xs font-semibold text-ink">${S.street} · Innenstadt</span></div>
      <div>
        <div class="flex items-center justify-between gap-4">${logo(true)}${statusPill(true)}</div>
        <div class="mt-5 grid gap-6 sm:grid-cols-2">
          <div><h2 class="text-xs font-semibold uppercase tracking-wider text-cream/50">Öffnungszeiten</h2><div class="mt-2 space-y-0.5 text-sm text-cream/80">${S.hours.map(([a,b])=>`<span class="flex justify-between gap-4"><span>${a}</span><span>${b}</span></span>`).join('')}</div></div>
          <div><h2 class="text-xs font-semibold uppercase tracking-wider text-cream/50">Kontakt</h2><address class="mt-2 space-y-1 text-sm not-italic text-cream/80"><p>${S.street}<br>${S.zip} ${S.city}</p><a href="#" class="ul block hover:text-orange">${S.phone}</a><a href="#" class="ul block hover:text-orange">${S.email}</a><a href="#" class="ul block hover:text-orange">Route planen →</a></address></div>
        </div>
        <nav class="mt-5 flex flex-wrap gap-x-5 gap-y-1 text-xs text-cream/60">${NAV.map(n=>`<a href="#" class="ul hover:text-orange">${n}</a>`).join('')}</nav>
      </div>
    </div>${legalBar(true)}
  </footer>`,
},

/* 05 · MINIMAL CENTERED */
minimal:{
  label:'05 · Minimal zentriert',
  blurb:'Zentriertes Logo, eine Zeile Navigation, Kontakt inline – ruhig & aufgeräumt. Weniger ist mehr.',
  motion:'Sanfte Hover-Unterstriche, Live-Status. Viel Weißraum.',
  vibe:'Minimal · ruhig',
  render:()=>`
  <footer class="bg-ink text-cream">
    <div class="mx-auto max-w-3xl px-7 py-14 text-center">
      ${logo(true)}
      <div class="mt-4 flex justify-center">${statusPill(true)}</div>
      <nav class="mt-6 flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm">${NAV.map(n=>`<a href="#" class="ul text-cream/80 hover:text-orange">${n}</a>`).join('')}</nav>
      <p class="mt-6 text-sm text-cream/70">${S.street} · ${S.zip} ${S.city} · ${S.district}</p>
      <p class="mt-1 text-sm"><a href="#" class="ul text-cream hover:text-orange">${S.phone}</a> · <a href="#" class="ul text-cream hover:text-orange">${S.email}</a></p>
    </div>${legalBar(true)}
  </footer>`,
},
};

/* ============ SHELL ============ */
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();vp.scrollTop=0;vp.innerHTML='<div class="min-h-full grid items-end">'+CONCEPTS[k].render()+'</div>';}
buildTabs();select(active);
</script>
</body>
</html>
