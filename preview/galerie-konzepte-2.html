<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salon Muster · Galerie – 3D-Effekte (06–10)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(480px,78vh,860px);overflow-y:auto;overflow-x:hidden;position:relative;background:#0f0b08;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .scene{perspective:1300px}.pre3d{transform-style:preserve-3d}
  .cf-card,.ring-card,.dolly-card,.holo,.wall-fr{will-change:transform}
  .holo{transform-style:preserve-3d;transition:transform .5s var(--eo)}.holo.live{transition:none}
  .foil{position:absolute;inset:0;border-radius:inherit;mix-blend-mode:color-dodge;opacity:0;transition:opacity .3s;background:linear-gradient(115deg,transparent 20%,rgba(255,120,170,.5),rgba(120,200,255,.5),rgba(180,255,160,.5),transparent 80%);background-size:200% 200%}
  .glare{position:absolute;inset:0;border-radius:inherit;mix-blend-mode:soft-light;opacity:0;transition:opacity .3s;background:radial-gradient(circle at var(--gx,50%) var(--gy,50%),rgba(255,255,255,.7),transparent 40%)}
  @media (prefers-reduced-motion:reduce){.cf-card,.ring-card,.dolly-card,.holo,.wall-fr{transition:none!important;transform:none!important}.foil,.glare{display:none}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Salon Muster · Galerie-3D</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Galerie — 3D-Effekte (06–10)</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Coverflow, Ring, Showroom-Wand, Scroll-Dolly & Holo-Kacheln. Maus/Drag/Scroll. Klick = Lightbox.</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">salon-muster.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">3D nach Craft-Regeln · GPU-only · spring-Lerp · reduce-motion-sicher.</footer>

<div id="lb" class="fixed inset-0 z-[60] hidden place-items-center bg-ink/90 p-6"><button id="lb-x" class="absolute right-5 top-4 text-3xl text-cream">×</button><img id="lb-img" class="max-h-[85vh] max-w-4xl rounded-xl object-contain" alt=""></div>

<script>
const U=id=>`https://images.unsplash.com/${id}?auto=format&fit=crop&w=800&q=72`;
const GAL=[
  [U('photo-1521590832167-7bcbfaa6381f'),'Damen-Haarschnitt'],[U('photo-1522336572468-97b06e8ef143'),'Balayage / Farbe'],[U('photo-1503951914875-452162b0f3f1'),'Herren-Schnitt'],[U('photo-1519741497674-611481863552'),'Hochzeitsfrisur'],[U('photo-1580618672591-eb180b1a973f'),'Damen-Styling'],[U('photo-1560869713-7d0a29430803'),'Strähnen / Farbe'],[U('photo-1599351431202-1e0f0137899a'),'Herren-Look'],[U('photo-1595152772835-219674b2a8a6'),'Hochsteckfrisur'],
];
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
const fine=()=>matchMedia('(hover:hover) and (pointer:fine)').matches && !reduced();
const lerp=(a,b,t)=>a+(b-a)*t;
const lb=document.getElementById('lb'),lbImg=document.getElementById('lb-img');
function openLB(src){lbImg.src=src.replace('w=800','w=1400');lb.style.display='grid';}
lb.onclick=()=>lb.style.display='none';document.getElementById('lb-x').onclick=()=>lb.style.display='none';addEventListener('keydown',e=>e.key==='Escape'&&(lb.style.display='none'));

const CONCEPTS={

/* 06 · COVERFLOW */
coverflow:{
  label:'06 · 3D Coverflow',
  blurb:'Arbeiten als 3D-Coverflow: mittlere groß & frontal, seitliche drehen in den Raum. Ziehen oder Pfeile, Klick = Lightbox.',
  motion:'rotateY + translateZ/X je Abstand. Wechsel retargetet flüssig. Aktives Bild scharf & vorn.',
  vibe:'Interaktiv-3D · spektakulär',
  render:()=>`
  <section class="bg-[#0f0b08] px-6 py-16 text-center text-cream">
    <p class="text-xs font-semibold uppercase tracking-[0.3em] text-orange">Unsere Werke</p>
    <h2 class="mx-auto mt-2 font-serif text-[clamp(1.6rem,1rem+2.4vw,2.4rem)] font-medium">Lookbook im Coverflow</h2>
    <div class="scene relative mx-auto mt-10 h-[360px] max-w-3xl">
      <div class="cf-stage pre3d absolute inset-0">
        ${GAL.map((it,i)=>`<figure class="cf-card absolute left-1/2 top-1/2 w-[260px] -translate-x-1/2 -translate-y-1/2 overflow-hidden rounded-2xl shadow-2xl" data-i="${i}" style="transition:transform .55s var(--eo),opacity .55s var(--eo)"><button onclick="openLB('${it[0]}')" class="block w-full"><div class="relative aspect-[3/4]"><img src="${it[0]}" class="h-full w-full object-cover" alt="${it[1]}"><div class="absolute inset-0 bg-gradient-to-t from-ink/70 to-transparent"></div><figcaption class="absolute inset-x-3 bottom-3 text-left font-serif text-sm text-cream">${it[1]}</figcaption></div></button></figure>`).join('')}
      </div>
    </div>
    <div class="mt-6 flex justify-center gap-3"><button class="cf-prev btn grid h-11 w-11 place-items-center rounded-full bg-orange text-ink">‹</button><button class="cf-next btn grid h-11 w-11 place-items-center rounded-full bg-orange text-ink">›</button></div>
  </section>${filler()}`,
  init:(vp)=>{const cards=[...vp.querySelectorAll('.cf-card')];let cur=Math.floor(cards.length/2);
    const lay=()=>cards.forEach((c,i)=>{const o=i-cur;c.style.transform=`translate(-50%,-50%) translateX(${o*160}px) translateZ(${-Math.abs(o)*200}px) rotateY(${o*-40}deg) scale(${o===0?1:.85})`;c.style.opacity=Math.abs(o)>2?0:1;c.style.zIndex=20-Math.abs(o);c.style.pointerEvents=o===0?'auto':'none';});lay();
    vp.querySelector('.cf-next').onclick=()=>{cur=Math.min(cards.length-1,cur+1);lay();};vp.querySelector('.cf-prev').onclick=()=>{cur=Math.max(0,cur-1);lay();};
    const st=vp.querySelector('.cf-stage');let sx=null;st.addEventListener('pointerdown',e=>sx=e.clientX);window.addEventListener('pointerup',e=>{if(sx===null)return;const d=e.clientX-sx;if(d<-40&&cur<cards.length-1)cur++;else if(d>40&&cur>0)cur--;lay();sx=null;});},
},

/* 07 · CYLINDER RING */
ring:{
  label:'07 · 3D Bilder-Ring',
  blurb:'Arbeiten auf einem rotierenden 3D-Zylinder – dreht von allein, mit Schwung ziehbar. Hypnotisch.',
  motion:'Karten auf Ring (rotateY + translateZ). Auto-Rotation, Drag mit Trägheit. Klick = Lightbox.',
  vibe:'Hypnotisch-3D · Hingucker',
  render:()=>`
  <section class="bg-ink px-6 py-16 text-center text-cream">
    <p class="text-xs font-semibold uppercase tracking-[0.3em] text-orange">Unsere Werke</p>
    <h2 class="mx-auto mt-2 font-serif text-[clamp(1.6rem,1rem+2.4vw,2.4rem)] font-medium">360° durch unsere Arbeiten</h2>
    <div class="scene mx-auto mt-12 h-[300px] max-w-2xl"><div class="ring pre3d relative mx-auto h-full w-[200px]">
      ${GAL.map((it,i)=>`<figure class="ring-card absolute inset-0 overflow-hidden rounded-2xl shadow-xl" data-i="${i}"><button onclick="openLB('${it[0]}')" class="block h-full w-full"><img src="${it[0]}" class="h-full w-full object-cover" alt="${it[1]}"></button></figure>`).join('')}
    </div></div>
    <p class="mt-8 text-xs text-cream/50">↔ ziehen zum Drehen</p>
  </section>${filler()}`,
  init:(vp)=>ringInit(vp),
},

/* 08 · SHOWROOM WALL */
wall:{
  label:'08 · Showroom-Wand',
  blurb:'Perspektivische Bilderwand; die „Kamera" schwenkt mit Maus/Drag daran entlang. Wie eine Galerie-Ausstellung.',
  motion:'Wand aus gerahmten Bildern in 3D (translateZ/rotateY). Maus schwenkt die Kamera per Spring-Lerp. Klick = Lightbox.',
  vibe:'Showroom-3D · räumlich-edel',
  render:()=>`
  <section class="scene relative grid min-h-[clamp(440px,62vh,700px)] place-items-center overflow-hidden bg-gradient-to-b from-[#171009] to-[#0f0b08] px-6 text-cream">
    <p class="absolute top-6 left-1/2 -translate-x-1/2 text-xs font-semibold uppercase tracking-[0.3em] text-orange">Galerie · Ausstellung</p>
    <div class="wall-cam pre3d relative h-[320px] w-full max-w-5xl"><div class="wall pre3d absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
      ${GAL.slice(0,6).map((it,i)=>{const x=(i-2.5)*270;const z=(i%2?60:-20);return `<figure class="wall-fr absolute -translate-x-1/2 -translate-y-1/2 overflow-hidden rounded-xl border-4 border-[#2a211b] shadow-2xl" style="transform:translate3d(${x}px,0,${z}px) rotateY(${x<0?9:x>0?-9:0}deg);width:220px;height:290px"><button onclick="openLB('${it[0]}')" class="block h-full w-full"><img src="${it[0]}" class="h-full w-full object-cover" alt="${it[1]}"></button></figure>`;}).join('')}
    </div></div>
    <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-xs text-cream/40">↔ Maus bewegen / ziehen</p>
  </section>${filler()}`,
  init:(vp)=>wallInit(vp),
},

/* 09 · SCROLL DOLLY */
dolly:{
  label:'09 · 3D Scroll-Dolly',
  blurb:'Beim Scrollen „fliegt die Kamera" durch die Bilder im Raum (translateZ). Cinematischer Tiefen-Flug durch eure Arbeiten.',
  motion:'Container-Z bewegt sich mit dem Scroll; Bilder kommen aus der Tiefe, scharf in der Mitte, faden an den Rändern. Klick = Lightbox.',
  vibe:'Cinematic-3D · Tiefenflug',
  render:()=>`
  <section class="scene relative bg-[#0f0b08]" style="height:300%">
    <div class="dolly-pin sticky top-0 grid h-[100svh] place-items-center overflow-hidden text-cream">
      <p class="absolute top-8 left-1/2 -translate-x-1/2 text-xs uppercase tracking-[0.3em] text-orange">↓ scrollen — flieg hindurch</p>
      <div class="dolly pre3d relative h-[300px] w-[360px]">
        ${GAL.map((it,i)=>`<figure class="dolly-card absolute inset-0 overflow-hidden rounded-2xl shadow-2xl" data-i="${i}"><button onclick="openLB('${it[0]}')" class="block h-full w-full"><img src="${it[0]}" class="h-full w-full object-cover" alt="${it[1]}"><div class="absolute inset-0 bg-gradient-to-t from-ink/70 to-transparent"></div><figcaption class="absolute inset-x-4 bottom-3 text-left font-serif text-cream">${it[1]}</figcaption></button></figure>`).join('')}
      </div>
    </div>
  </section>${filler()}`,
  init:(vp)=>dollyInit(vp),
},

/* 10 · HOLO TILES */
holo:{
  label:'10 · Holo-Kacheln',
  blurb:'Bilder-Kacheln mit Foil-Schimmer & Glanzlicht beim Kippen – wie edle Sammelkarten. Klick = Lightbox.',
  motion:'Spring-Lerp-Tilt pro Kachel, Foil-Gradient verschiebt sich, Glare folgt der Maus. Touch/reduce: ruhig.',
  vibe:'Königsklasse · Sammelkarte',
  render:()=>`
  <section class="bg-gradient-to-b from-[#1b140f] to-[#0f0b08] px-7 py-14 text-cream sm:px-10">
    <p class="text-xs font-semibold uppercase tracking-[0.3em] text-orange">Unsere Werke</p>
    <h2 class="mt-3 mb-8 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium">Lookbook · holografisch</h2>
    <div class="scene grid grid-cols-2 gap-5 sm:grid-cols-3 lg:grid-cols-4">
      ${GAL.map(it=>`<button onclick="openLB('${it[0]}')" class="holo relative block aspect-[3/4] overflow-hidden rounded-2xl bg-ink shadow-2xl"><img src="${it[0]}" class="absolute inset-0 h-full w-full object-cover" alt="${it[1]}"><div class="absolute inset-0 bg-gradient-to-t from-ink/70 to-transparent"></div><div class="foil"></div><div class="glare"></div><span class="absolute inset-x-3 bottom-3 text-left font-serif text-sm">${it[1]}</span></button>`).join('')}
    </div>
  </section>${filler()}`,
  init:(vp)=>{const cards=[...vp.querySelectorAll('.holo')];if(!fine())return;
    cards.forEach(card=>{const foil=card.querySelector('.foil'),glare=card.querySelector('.glare');let tx=0,ty=0,cx=0,cy=0,tg=50,tgy=50,cg=50,cgy=50,raf=null,act=false;
      const loop=()=>{cx=lerp(cx,tx,.14);cy=lerp(cy,ty,.14);cg=lerp(cg,tg,.14);cgy=lerp(cgy,tgy,.14);card.style.transform=`rotateX(${(-cy*14).toFixed(2)}deg) rotateY(${(cx*16).toFixed(2)}deg)`;foil.style.backgroundPosition=`${cg}% ${cgy}%`;glare.style.setProperty('--gx',cg+'%');glare.style.setProperty('--gy',cgy+'%');if(act||Math.abs(cx-tx)>.01)raf=requestAnimationFrame(loop);else raf=null;};
      card.classList.add('live');
      card.addEventListener('mousemove',e=>{const r=card.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;tx=x;ty=y;tg=(x+.5)*100;tgy=(y+.5)*100;act=true;foil.style.opacity='.85';glare.style.opacity='1';if(!raf)raf=requestAnimationFrame(loop);});
      card.addEventListener('mouseleave',()=>{tx=0;ty=0;act=false;foil.style.opacity='0';glare.style.opacity='0';if(!raf)raf=requestAnimationFrame(loop);});});},
},
};

/* ============ ENGINES ============ */
function ringInit(vp){const cards=[...vp.querySelectorAll('.ring-card')],ring=vp.querySelector('.ring');if(!cards.length)return;const n=cards.length,step=360/n,R=320;
  cards.forEach((c,i)=>c.style.transform=`rotateY(${i*step}deg) translateZ(${R}px)`);
  if(reduced()){ring.style.transform=`translateZ(-${R}px)`;return;}
  let ang=0,vel=0.2,raf,drag=false,lx=0;
  const loop=()=>{if(!drag){ang+=vel;vel*=0.995;if(Math.abs(vel)<0.06)vel=vel<0?-0.06:0.06;}ring.style.transform=`translateZ(-${R}px) rotateY(${ang}deg)`;raf=requestAnimationFrame(loop);};raf=requestAnimationFrame(loop);
  ring.parentElement.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;vel=0;});
  window.addEventListener('pointermove',e=>{if(!drag)return;const d=e.clientX-lx;ang+=d*0.4;vel=d*0.2;lx=e.clientX;});
  window.addEventListener('pointerup',()=>drag=false);}
function wallInit(vp){const cam=vp.querySelector('.wall');if(!cam)return;if(!fine()){cam.style.transform='translateZ(-160px)';return;}
  let tx=0,cx=0,raf=null,drag=false,lastX=0;
  const loop=()=>{cx=lerp(cx,tx,.09);cam.style.transform=`translateZ(-160px) translateX(${cx.toFixed(1)}px) rotateY(${(-cx*0.02).toFixed(2)}deg)`;if(Math.abs(cx-tx)>.2)raf=requestAnimationFrame(loop);else raf=null;};
  vp.querySelector('section').addEventListener('mousemove',e=>{const r=vp.getBoundingClientRect();tx=-((e.clientX-r.left)/r.width-.5)*760;if(!raf)raf=requestAnimationFrame(loop);});
  vp.querySelector('section').addEventListener('pointerdown',e=>{drag=true;lastX=e.clientX;});
  window.addEventListener('pointermove',e=>{if(!drag)return;tx=Math.max(-760,Math.min(760,tx+(e.clientX-lastX)));lastX=e.clientX;if(!raf)raf=requestAnimationFrame(loop);});
  window.addEventListener('pointerup',()=>drag=false);}
function dollyInit(vp){const sec=vp.querySelector('section'),pin=vp.querySelector('.dolly-pin'),cards=[...vp.querySelectorAll('.dolly-card')];if(!cards.length)return;pin.style.height=vp.clientHeight+'px';const GAP=460;
  cards.forEach((c,i)=>c.dataset.base=(-i*GAP));
  const run=()=>{const total=sec.offsetHeight-vp.clientHeight;const p=Math.max(0,Math.min(1,(vp.scrollTop-sec.offsetTop)/total));const cam=p*(cards.length-1)*GAP;
    cards.forEach(c=>{const z=(+c.dataset.base)+cam;const dist=Math.abs(z);const op=reduced()?1:Math.max(0,1-dist/560);c.style.transform=`translateZ(${z}px)`;c.style.opacity=op.toFixed(2);c.style.zIndex=String(2000-Math.round(dist));});};
  if(reduced()){cards.forEach((c,i)=>{c.style.transform='none';c.style.opacity=i===0?1:0;});return;}
  vp.addEventListener('scroll',()=>requestAnimationFrame(run),{passive:true});run();}

/* ============ SHELL ============ */
function filler(){return `<section class="bg-[#0f0b08] px-6 py-12 text-cream"><p class="text-center font-serif text-lg text-cream/55">↑ weiter scrollen</p><div class="h-[24vh]"></div></section>`;}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();requestAnimationFrame(()=>{c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
