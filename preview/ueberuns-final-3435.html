<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hair Power · Über uns – Final (34 + 35)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
    keyframes:{marquee:{from:{transform:'translateX(0)'},to:{transform:'translateX(-50%)'}}},
    animation:{marquee:'marquee 38s linear infinite'},
  }}};
</script>
<style>
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#0f0b08}
  .trail-img{position:absolute;width:128px;height:160px;object-fit:cover;border-radius:14px;pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.7);will-change:transform,opacity;box-shadow:0 30px 60px -20px rgba(0,0,0,.6)}
  @media (prefers-reduced-motion:reduce){.trail-img{display:none}.animate-marquee{animation:none!important}}
</style>
</head>
<body class="text-cream">

<section id="host" class="relative overflow-hidden bg-ink px-6 py-24 text-cream lg:px-10">
  <div id="trail" class="pointer-events-none absolute inset-0 z-0"></div>

  <div class="relative z-10 mx-auto max-w-screen-2xl text-center">
    <p class="text-xs font-semibold uppercase tracking-[0.3em] text-orange">Worauf ihr euch verlasst</p>
    <h2 class="mx-auto mt-3 max-w-[22ch] font-serif text-[clamp(1.7rem,1rem+2.6vw,2.8rem)] font-medium leading-tight">Zahlen, die für sich sprechen</h2>
    <p class="mx-auto mt-4 max-w-[52ch] font-serif text-lg italic text-orange/90">„Style zu Mensch, passender Look und Zufriedenheit."</p>

    <div class="mx-auto mt-12 grid max-w-3xl grid-cols-1 gap-10 sm:grid-cols-3">
      <div><div class="font-serif text-[clamp(2.6rem,8vw,4.4rem)] font-semibold leading-none tabular-nums text-orange"><span class="odo" data-to="15" data-dec="0">0</span>+</div><p class="mt-3 text-sm text-cream/70">Jahre Meisterbetrieb</p></div>
      <div><div class="font-serif text-[clamp(2.6rem,8vw,4.4rem)] font-semibold leading-none tabular-nums text-orange"><span class="odo" data-to="254" data-dec="0">0</span></div><p class="mt-3 text-sm text-cream/70">Google-Bewertungen</p></div>
      <div><div class="font-serif text-[clamp(2.6rem,8vw,4.4rem)] font-semibold leading-none tabular-nums text-orange"><span class="odo" data-to="4.3" data-dec="1">0</span> ★</div><p class="mt-3 text-sm text-cream/70">Schnitt aus 254 Rezensionen</p></div>
    </div>
  </div>

  <div class="relative z-10 mt-16 overflow-hidden border-y border-white/10 py-3">
    <div class="flex w-max animate-marquee whitespace-nowrap font-serif text-xl italic text-cream/45" id="mq"></div>
  </div>
  <p class="relative z-10 mt-6 text-center text-xs text-cream/40">↗ Beweg die Maus über diesen Bereich</p>
</section>

<section class="bg-cream2 px-6 py-16 text-center text-ink"><p class="font-serif text-xl text-inkSoft">Hier ginge die Seite weiter …</p></section>

<script>
const IMG=[
  "https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80",
  "https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=900&q=80",
];
const VALUES=['Meisterhandwerk','Ohne Termine','Faire Preise','Natürlich schön','Persönliche Beratung','Barrierefrei'];
const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
const fine=matchMedia('(hover:hover) and (pointer:fine)').matches && !reduced;
const EO='cubic-bezier(.23,1,.32,1)';

// Marquee
const seq=VALUES.map(v=>`<span class="mx-6 inline-flex items-center gap-3">${v}<span class="text-orange/70">✦</span></span>`).join('');
document.getElementById('mq').innerHTML=seq+seq;

// Odometer count-up
const odo=()=>document.querySelectorAll('.odo').forEach(el=>{const to=+el.dataset.to,dec=+el.dataset.dec;
  if(reduced){el.textContent=to.toFixed(dec).replace('.',',');return;}
  let t0;const step=t=>{t0=t0||t;const p=Math.min((t-t0)/1300,1);const e=1-Math.pow(1-p,4);el.textContent=(to*e).toFixed(dec).replace('.',',');if(p<1)requestAnimationFrame(step);else el.textContent=to.toFixed(dec).replace('.',',');};requestAnimationFrame(step);});
const io=new IntersectionObserver(es=>{if(es[0].isIntersecting){odo();io.disconnect();}},{threshold:.4});
io.observe(document.querySelector('.odo'));

// Cursor-Bilderspur
(function(){ const host=document.getElementById('host'),layer=document.getElementById('trail'); if(!fine)return;
  const pool=IMG.concat(IMG).map(src=>{const im=document.createElement('img');im.src=src;im.className='trail-img';im.alt='';layer.appendChild(im);return im;});
  let idx=0,lx=null,ly=null;const STEP=55;
  const spawn=(x,y)=>{const im=pool[idx%pool.length];idx++;im.style.left=x+'px';im.style.top=y+'px';
    im.style.transition='none';im.style.opacity='1';im.style.transform=`translate(-50%,-50%) scale(1) rotate(${(Math.random()*12-6).toFixed(1)}deg)`;
    void im.offsetWidth;im.style.transition=`opacity .9s ${EO},transform .9s ${EO}`;im.style.opacity='0';im.style.transform='translate(-50%,-50%) scale(.72)';};
  host.addEventListener('mousemove',e=>{const r=host.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
    if(lx===null){lx=x;ly=y;spawn(x,y);return;}const dx=x-lx,dy=y-ly,dist=Math.hypot(dx,dy);
    if(dist>=STEP){const steps=Math.min(4,Math.floor(dist/STEP));for(let i=1;i<=steps;i++)spawn(lx+dx*(i/steps),ly+dy*(i/steps));lx=x;ly=y;}});
})();
</script>
</body>
</html>
