<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hair Power · Leistungen – 5 weitere Konzepte (11–15)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(480px,78vh,860px);overflow-y:auto;overflow-x:hidden;position:relative;background:#F9F6F2;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s var(--eo),transform .7s var(--eo)}.reveal.in{opacity:1;transform:none}
  .lift{transition:transform .3s var(--eo),box-shadow .3s var(--eo)}.lift:hover{transform:translateY(-6px);box-shadow:0 30px 60px -28px rgba(42,33,27,.55)}
  .vsnap{scroll-snap-type:y mandatory}.vsnap>*{scroll-snap-align:start}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Hair Power · Relaunch</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Leistungen — weitere Konzepte (11–15)</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Frische Richtungen: Pakete, Such-Finder, Vergleichstabelle, Vollbild-Snap & Bento-Board.</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">friseur-hairpower.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Konzepte 11–15 · echte Preise.</footer>

<script>
const IMG={salon:"https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1200&q=80",color:"https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?auto=format&fit=crop&w=1100&q=80",chair:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1100&q=80",man:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=1100&q=80"};
// Flache Liste aller Leistungen (für Finder)
const ALL=[
  ['Damen','Waschen · Schneiden · Föhnen','37,50 €'],['Damen','Anfeuchten · Schneiden','26,50 €'],['Damen','Pony schneiden','7,00 €'],['Damen','Dauerwelle','ab 49,50 €'],['Damen','Hochsteckfrisur','ab 45,00 €'],['Damen','Haarfärbung (Neu)','ab 39,50 €'],['Damen','Tönung','ab 26,50 €'],['Damen','Balayage','ab 135,00 €',1],['Damen','Foliensträhnen','ab 45,50 €'],
  ['Herren','Waschen · Schneiden · Föhnen','26,50 €'],['Herren','Maschinenschnitt','16,00 €'],['Herren','Konturenschnitt','15,00 €'],['Herren','Bart schneiden','8,00 €'],['Herren','Haarfärbung','ab 35,50 €'],['Herren','Strähnen','ab 21,00 €'],
  ['Kinder','Haarschnitt bis 14 J.','17,50 €'],['Kinder','Waschen · Schneiden · Föhnen','ab 24,50 €'],
];
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;

const CONCEPTS={

/* 11 · PACKAGE TIERS */
tiers:{
  label:'11 · Paket-Tarife',
  blurb:'Beliebte Leistungen als 3 Pakete (Quick · Klassik · Verwöhn) im SaaS-Pricing-Stil, „Beliebt"-Badge. Lenkt klar zur Wahl.',
  motion:'Karten poppen gestaffelt, mittlere („Beliebt") hervorgehoben & leicht angehoben. Hover-Lift. Sehr entscheidungsfreundlich.',
  vibe:'Conversion · klare Wahl',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 text-center sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Beliebte Leistungen</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Drei Wege zu deinem Look</h2>
    <div class="mx-auto mt-10 grid max-w-4xl gap-5 md:grid-cols-3">
      ${[
        ['Quick','ab 19,50 €','Schnell & frisch',['Anfeuchten · Schneiden','Kurze Wartezeit','Ohne Termin'],false],
        ['Klassik','ab 37,50 €','Der Allrounder',['Waschen · Schneiden · Föhnen','Typgerechte Beratung','Pflege-Tipp inklusive'],true],
        ['Verwöhn','ab 46,50 €','Zeit für dich',['Waschen · Schneiden · Föhnen','Intensiv-Pflegekur','Extra Styling-Zeit'],false],
      ].map(([t,p,sub,feat,pop])=>`<article class="reveal lift relative rounded-3xl border ${pop?'border-terra bg-white shadow-2xl md:-mt-3 md:mb-3':'border-ink/10 bg-white'} p-7 text-left">${pop?'<span class="absolute -top-3 left-1/2 -translate-x-1/2 rounded-full bg-terra px-4 py-1 text-xs font-bold uppercase text-white">Beliebt</span>':''}<h3 class="font-serif text-2xl font-medium">${t}</h3><p class="text-sm text-inkSoft">${sub}</p><p class="mt-4 font-serif text-3xl text-terra">${p}</p><ul class="mt-5 space-y-2 text-sm">${feat.map(f=>`<li class="flex items-start gap-2"><span class="text-terra">✓</span>${f}</li>`).join('')}</ul><a href="#" class="btn mt-6 inline-flex min-h-[44px] w-full items-center justify-center rounded-xl ${pop?'bg-terra text-white':'border border-ink/15 text-ink'} px-5 font-semibold">Vorbeikommen</a></article>`).join('')}
    </div>
    <p class="reveal mt-6 text-xs text-inkSoft">Pakete sind Richtwerte · komplette Preisliste auf Wunsch · ohne Termin.</p>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 12 · PRICE FINDER */
finder:{
  label:'12 · Preis-Finder (Suche)',
  blurb:'Tippen, um jede Leistung & ihren Preis sofort zu finden. Schnell, app-haft, super bei großer Liste.',
  motion:'Live-Filter beim Tippen, Treffer faden ein. Kategorie-Tag je Zeile. Balayage hervorgehoben.',
  vibe:'Utility · schnell & modern',
  render:()=>`
  <section class="bg-cream px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Leistungen & Preise</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Finde deinen Preis.</h2>
    <div class="reveal mt-5 flex items-center gap-3 rounded-2xl border border-ink/15 bg-white px-4 py-3" style="transition-delay:.14s">
      <span class="text-inkSoft">🔍</span><input id="fi-in" type="text" placeholder="z. B. Balayage, Bart, Föhnen …" class="w-full bg-transparent text-base outline-none placeholder:text-inkSoft/60">
    </div>
    <div id="fi-list" class="mt-5 space-y-1.5"></div>
  </section>${filler('light')}`,
  init:(vp)=>{const inp=vp.querySelector('#fi-in'),list=vp.querySelector('#fi-list');
    const draw=q=>{const f=ALL.filter(([c,n])=>(c+' '+n).toLowerCase().includes(q.toLowerCase()));
      list.innerHTML=f.length?f.map(([c,n,p,feat])=>`<div class="flex items-center gap-3 rounded-xl border border-ink/10 bg-white px-4 py-3 ${feat?'ring-1 ring-orange/40':''}"><span class="rounded-full bg-cream2 px-2.5 py-1 text-[0.65rem] font-semibold uppercase text-brownDark">${c}</span><span class="flex-1 text-sm font-medium">${n}${feat?' <span class="text-[0.6rem] uppercase tracking-wider text-terra">Spezialität</span>':''}</span><span class="font-semibold tabular-nums text-brownDark">${p}</span></div>`).join(''):`<p class="py-6 text-center text-inkSoft">Nichts gefunden – frag uns einfach vor Ort 🙂</p>`;};
    inp.addEventListener('input',()=>draw(inp.value));draw('');},
},

/* 13 · COMPARISON TABLE */
table:{
  label:'13 · Vergleichstabelle',
  blurb:'Damen / Herren / Kinder als Spalten nebeneinander — direkter Preisvergleich auf einen Blick. Sachlich & klar.',
  motion:'Zeilen erscheinen gestaffelt. Spalten-Header sticky. Balayage-Zeile hervorgehoben. Sehr scanbar.',
  vibe:'Sachlich-klar · vergleichbar',
  render:()=>{const rows=[['Anfeuchten · Schneiden','26,50 €','19,50 €','17,50 €'],['Waschen · Schneiden · Föhnen','37,50 €','26,50 €','ab 24,50 €'],['Haarfärbung','ab 39,50 €','ab 35,50 €','–'],['Strähnen / Folien','ab 45,50 €','ab 21,00 €','–'],['Balayage','ab 135 €','–','–',1],['Bart schneiden','–','8,00 €','–']];return `
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Leistungen im Vergleich</p>
    <h2 class="reveal mt-3 mb-6 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Alles auf einen Blick</h2>
    <div class="overflow-x-auto rounded-2xl border border-ink/10 bg-white">
      <table class="w-full min-w-[520px] text-left text-sm">
        <thead class="sticky top-0 bg-cream2"><tr><th class="px-4 py-3 font-semibold">Leistung</th><th class="px-4 py-3 text-right font-semibold text-terra">Damen</th><th class="px-4 py-3 text-right font-semibold text-terra">Herren</th><th class="px-4 py-3 text-right font-semibold text-terra">Kinder</th></tr></thead>
        <tbody>${rows.map(([n,d,h,k,f])=>`<tr class="reveal border-t border-ink/8 ${f?'bg-orange/10':''}"><td class="px-4 py-3 font-medium">${n}${f?' <span class="rounded-full bg-terra px-2 py-0.5 text-[0.55rem] font-bold uppercase text-white">Spezial</span>':''}</td><td class="px-4 py-3 text-right tabular-nums ${d==='–'?'text-inkSoft/40':'font-semibold text-brownDark'}">${d}</td><td class="px-4 py-3 text-right tabular-nums ${h==='–'?'text-inkSoft/40':'font-semibold text-brownDark'}">${h}</td><td class="px-4 py-3 text-right tabular-nums ${k==='–'?'text-inkSoft/40':'font-semibold text-brownDark'}">${k}</td></tr>`).join('')}</tbody>
      </table>
    </div>
  </section>${filler('light')}`;},
  init:()=>{},
},

/* 14 · FULLSCREEN SNAP */
snap:{
  label:'14 · Vollbild-Snap',
  blurb:'Jede Kategorie als vollflächiges Bild-Panel mit großen Preisen; vertikales Scroll rastet ein. Cinematisch, mutig.',
  motion:'Scroll-Snap (Y) zwischen Vollbild-Panels. Große Typo, Bild gedimmt, Preise reveal-en. Awwwards-Feel.',
  vibe:'Cinematic · groß & mutig',
  render:()=>`
  <div class="vsnap h-full">
    ${[['Damen',IMG.color,[['Schnitt & Föhnen','37,50 €'],['Balayage','ab 135 €']]],['Herren',IMG.man,[['Schnitt & Föhnen','26,50 €'],['Bart','8 €']]],['Kinder',IMG.salon,[['bis 14 Jahre','17,50 €'],['mit Föhnen','ab 24,50 €']]]].map(([t,img,items])=>`
    <section class="relative grid h-full min-h-[100%] place-items-center overflow-hidden text-center text-cream"><img src="${img}" class="absolute inset-0 h-full w-full object-cover" alt=""><div class="absolute inset-0 bg-ink/60"></div><div class="relative px-6"><h3 class="font-serif text-[clamp(2.4rem,9vw,5rem)] font-medium leading-none">${t}</h3><div class="mt-6 space-y-2">${items.map(([n,p])=>`<p class="text-lg"><span class="text-cream/80">${n}</span> · <b class="text-orange">${p}</b></p>`).join('')}</div></div></section>`).join('')}
    ${filler('dark')}
  </div>`,
  init:()=>{},
},

/* 15 · BENTO BOARD */
bento:{
  label:'15 · Bento-Preisboard',
  blurb:'Gemischte Kacheln: Balayage groß, Klassiker mittel, Kennzahl & CTA klein. Modern, dicht, übersichtlich.',
  motion:'Kacheln poppen gestaffelt, Hover-Lift. Spezialität dominiert das Board. Kompakt & modern.',
  vibe:'Modern · bento-dicht',
  render:()=>`
  <section class="bg-cream px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Leistungen & Preise</p>
    <h2 class="reveal mt-3 mb-6 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Das Wichtigste im Überblick</h2>
    <div class="grid auto-rows-[minmax(0,1fr)] grid-cols-2 gap-3 sm:grid-cols-4">
      <article class="reveal lift col-span-2 row-span-2 flex flex-col justify-between overflow-hidden rounded-3xl bg-ink p-6 text-cream"><div><span class="rounded-full bg-orange px-3 py-1 text-xs font-semibold text-ink">Spezialität</span><h3 class="mt-4 font-serif text-3xl">Balayage & Highlights</h3><p class="mt-2 text-sm text-cream/70">Natürliche Übergänge, auf Wunsch ammoniakfrei.</p></div><p class="font-serif text-4xl text-orange">ab 135 €</p></article>
      <article class="reveal lift col-span-2 flex items-center justify-between rounded-3xl bg-terra p-6 text-white"><span class="font-serif text-xl">Waschen·Schneiden·Föhnen</span><b class="text-2xl">37,50 €</b></article>
      <article class="reveal lift flex flex-col justify-center rounded-3xl bg-cream2 p-5 text-center"><b class="font-serif text-2xl">16 €</b><span class="mt-1 text-xs text-inkSoft">Herren-Maschinenschnitt</span></article>
      <article class="reveal lift flex flex-col justify-center rounded-3xl bg-cream2 p-5 text-center"><b class="font-serif text-2xl">17,50 €</b><span class="mt-1 text-xs text-inkSoft">Kinder bis 14 J.</span></article>
      <article class="reveal lift col-span-2 flex flex-col justify-center rounded-3xl bg-orange/20 p-5 text-center"><b class="font-serif text-2xl text-ink">4,3 ★ · 254</b><span class="mt-1 text-xs text-inkSoft">Google-Bewertungen</span></article>
      <article class="reveal lift col-span-2 flex items-center justify-center rounded-3xl bg-ink p-5 text-center text-cream"><a href="#" class="btn font-semibold text-orange">Komplette Preisliste · ohne Termin →</a></article>
    </div>
  </section>${filler('light')}`,
  init:()=>{},
},
};

/* ============ HELPERS ============ */
function filler(t){const d=t==='dark';return `<section class="${d?'bg-ink text-cream':'bg-cream2 text-ink'} px-6 py-12"><p class="text-center font-serif text-lg ${d?'text-cream/55':'text-inkSoft'}">↑ weiter scrollen</p><div class="h-[24vh]"></div></section>`;}
let io;function wireReveal(vp){if(io)io.disconnect();io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.1});vp.querySelectorAll('.reveal').forEach(el=>io.observe(el));}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();wireReveal(vp);requestAnimationFrame(()=>{vp.querySelectorAll('.reveal').forEach(el=>{const r=el.getBoundingClientRect();if(r.top<vp.clientHeight+40)el.classList.add('in');});c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
