<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hair Power · Leistungen – 5 weitere Konzepte (06–10)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(480px,78vh,860px);overflow-y:auto;overflow-x:hidden;position:relative;background:#F9F6F2;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s var(--eo),transform .7s var(--eo)}.reveal.in{opacity:1;transform:none}
  .lift{transition:transform .3s var(--eo),box-shadow .3s var(--eo)}.lift:hover{transform:translateY(-4px);box-shadow:0 24px 50px -28px rgba(42,33,27,.5)}
  .hsnap{scroll-snap-type:x mandatory}.hsnap>*{scroll-snap-align:center}
  .ov{transform:translateY(100%);transition:transform .5s var(--eo)}.ovcard.open .ov{transform:translateY(0)}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important}.ov{transition:none}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Hair Power · Relaunch</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Leistungen — weitere Konzepte (06–10)</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Fünf zusätzliche Richtungen. Tab wählen, im Fenster scrollen/wischen/klicken.</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">friseur-hairpower.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Konzepte 06–10 · echte Preise.</footer>

<script>
const IMG={salon:"https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1200&q=80",color:"https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?auto=format&fit=crop&w=1100&q=80",chair:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1100&q=80",man:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=1100&q=80",kid:"https://images.unsplash.com/photo-1503454537195-1dcabb73ffb9?auto=format&fit=crop&w=1100&q=80"};
const DATA={
  damen:{label:'Damen',img:IMG.color,intro:'Individuell & modebewusst – Technik trifft Trend.',groups:[
    {title:'Schnitt & Styling',items:[['Waschen · Schneiden · Föhnen','37,50 €'],['Anfeuchten · Schneiden','26,50 €'],['Dauerwelle','ab 49,50 €'],['Hochsteckfrisur','ab 45,00 €']]},
    {title:'Farbe & Strähnen',items:[['Haarfärbung (Neu)','ab 39,50 €'],['Tönung','ab 26,50 €'],['Balayage','ab 135,00 €',1],['Foliensträhnen','ab 45,50 €']]},
  ]},
  herren:{label:'Herren',img:IMG.man,intro:'Typgerecht, pflegeleicht, geradlinig.',groups:[
    {title:'Schnitt & Bart',items:[['Waschen · Schneiden · Föhnen','26,50 €'],['Maschinenschnitt','16,00 €'],['Konturenschnitt','15,00 €'],['Bart schneiden','8,00 €']]},
    {title:'Farbe & Strähnen',items:[['Haarfärbung','ab 35,50 €'],['Strähnen','ab 21,00 €']]},
  ]},
  kinder:{label:'Kinder',img:IMG.kid,intro:'Trendig, altersgerecht, mit Spielecke. Bis 14 Jahre.',groups:[
    {title:'',items:[['Haarschnitt bis 14 J.','17,50 €'],['Waschen · Schneiden · Föhnen','ab 24,50 €']]},
  ]},
};
const OCC={kick:'Besondere Anlässe',title:'Frisuren für Deinen schönsten Tag',text:'Hochzeit, Theater, Business & Feiern – passend zum Anlass.',price:'Hochsteckfrisur ab 45 €'};
const cats=Object.keys(DATA);
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;

const CONCEPTS={

/* 06 · STICKY SPLIT */
split:{
  label:'06 · Sticky Split-Nav',
  blurb:'Linke Kategorie-Navigation bleibt stehen, rechts scrollen die Preis-Sektionen vorbei; aktiv wird hervorgehoben. Sehr edel.',
  motion:'Sticky-Navigation, Scroll-Spy markiert die sichtbare Kategorie. Sektionen reveal-en beim Eintritt. Klick scrollt sanft.',
  vibe:'Editorial-premium · übersichtlich',
  render:()=>`
  <section class="bg-cream px-7 py-12 sm:px-10">
    <div class="grid gap-10 md:grid-cols-[200px_1fr]">
      <nav class="md:sticky md:top-6 md:self-start">
        <p class="text-xs font-semibold uppercase tracking-[0.22em] text-terra">Leistungen</p>
        <ul id="sp-nav" class="mt-4 space-y-1">${cats.map(c=>`<li><a href="#sp-${c}" data-c="${c}" class="sp-link block rounded-lg px-3 py-2 font-serif text-lg text-inkSoft transition-colors">${DATA[c].label}</a></li>`).join('')}<li><a href="#sp-occ" data-c="occ" class="sp-link block rounded-lg px-3 py-2 font-serif text-lg text-inkSoft transition-colors">Anlässe</a></li></ul>
      </nav>
      <div class="space-y-12">
        ${cats.map(c=>`<div id="sp-${c}" class="sp-sec scroll-mt-4"><h3 class="font-serif text-2xl font-medium">${DATA[c].label}</h3><p class="mt-1 italic text-brownDark">${DATA[c].intro}</p><div class="mt-4 grid gap-x-10 gap-y-5 sm:grid-cols-2">${DATA[c].groups.map(g=>`<div class="${DATA[c].groups.length===1?'sm:col-span-2':''}">${g.title?`<h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-terra">${g.title}</h4>`:''}${g.items.map(rowDots).join('')}</div>`).join('')}</div></div>`).join('')}
        <div id="sp-occ" class="sp-sec scroll-mt-4">${occBlock()}</div>
      </div>
    </div>
  </section>${filler('light')}`,
  init:(vp)=>splitInit(vp),
},

/* 07 · FEATURED SPECIALTY */
featured:{
  label:'07 · Spezialität im Fokus',
  blurb:'Balayage (ab 135 €) als große Hero-Karte mit Bild & CTA oben, darunter die kompakte Preisliste. Verkaufsstark.',
  motion:'Hero-Karte reveal-t mit Bild-Zoom. Darunter Tabs + kompakte Liste. Lenkt den Blick auf die Premium-Leistung.',
  vibe:'Conversion · Spezialität verkaufen',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <div class="reveal grid items-stretch overflow-hidden rounded-3xl bg-ink text-cream md:grid-cols-2">
      <div class="relative min-h-[220px] overflow-hidden"><img src="${IMG.color}" class="h-full w-full object-cover" alt="Balayage"><span class="absolute left-4 top-4 rounded-full bg-orange px-3 py-1 text-xs font-semibold text-ink">Unsere Spezialität</span></div>
      <div class="flex flex-col justify-center p-8"><h2 class="font-serif text-3xl font-medium">Balayage & Highlights</h2><p class="mt-3 text-cream/75">Natürliche Übergänge, auf Hautton & Haartyp abgestimmt – auf Wunsch ammoniakfrei.</p><p class="mt-5 font-serif text-4xl text-orange">ab 135 €</p><a href="#" class="btn mt-5 inline-flex w-fit min-h-[46px] items-center rounded-full bg-orange px-6 font-semibold text-ink">Beratung – ohne Termin</a></div>
    </div>
    <div class="reveal mt-8 inline-flex flex-wrap gap-1.5 rounded-full bg-cream p-1.5" id="f-tabs" style="transition-delay:.1s"></div>
    <div id="f-panel" class="mt-5"></div>
  </section>${filler('light')}`,
  init:(vp)=>{const tabs=vp.querySelector('#f-tabs'),panel=vp.querySelector('#f-panel');let a=cats[0];
    const paint=()=>{tabs.innerHTML=cats.map(c=>`<button data-c="${c}" class="min-h-[40px] rounded-full px-5 text-sm font-semibold transition-colors ${c===a?'bg-white text-ink shadow':'text-inkSoft hover:text-ink'}">${DATA[c].label}</button>`).join('');tabs.querySelectorAll('button').forEach(b=>b.onclick=()=>{a=b.dataset.c;paint();});
      panel.innerHTML=`<div class="grid gap-x-10 gap-y-5 sm:grid-cols-2">${DATA[a].groups.map(g=>`<div class="${DATA[a].groups.length===1?'sm:col-span-2':''}">${g.title?`<h4 class="mb-1 text-xs font-semibold uppercase tracking-wider text-terra">${g.title}</h4>`:''}${g.items.map(rowDots).join('')}</div>`).join('')}</div>`;};paint();},
},

/* 08 · HORIZONTAL SNAP */
snap:{
  label:'08 · Horizontale Snap-Panels',
  blurb:'Kategorien als vollflächige Panels zum seitlichen Wischen (Snap), je mit Bild + Preisen. App-haftes, modernes Gefühl.',
  motion:'Native Scroll-Snap (butterweich, GPU). Punkt-Indikator zeigt das aktive Panel. Bild + Liste je Kategorie.',
  vibe:'App-modern · taktil',
  render:()=>`
  <section class="bg-cream px-0 py-12">
    <div class="px-7 sm:px-10"><p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Leistungen</p><h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Wisch dich durch.</h2></div>
    <div class="hsnap mt-6 flex gap-5 overflow-x-auto px-7 pb-4 sm:px-10" id="sn-track">
      ${cats.map(c=>`<article class="w-[85%] shrink-0 overflow-hidden rounded-3xl border border-ink/10 bg-cream2 sm:w-[60%]"><div class="relative h-40 overflow-hidden"><img src="${DATA[c].img}" class="h-full w-full object-cover" alt=""><span class="absolute inset-0 bg-ink/25"></span><h3 class="absolute bottom-3 left-4 font-serif text-2xl text-cream">${DATA[c].label}</h3></div><div class="p-5">${DATA[c].groups.map(g=>`${g.title?`<h4 class="mb-1 mt-2 text-xs font-semibold uppercase tracking-wider text-terra">${g.title}</h4>`:''}${g.items.map(rowDots).join('')}`).join('')}</div></article>`).join('')}
    </div>
    <div class="px-7 text-center text-xs text-inkSoft sm:px-10">← horizontal wischen →</div>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 09 · MAGAZINE SPREAD */
magazine:{
  label:'09 · Magazin-Spread',
  blurb:'Editorial wie ein Mode-Magazin: große Typo, Pull-Quote, Preise als Spalten neben einem Bild. Sehr „designt".',
  motion:'Spalten & Bild reveal-en versetzt. Große Zahlen als Blickfang. Ruhige, edle Anmutung.',
  vibe:'Editorial-bold · Magazin',
  render:()=>`
  <section class="bg-cream px-7 py-14 sm:px-10">
    <div class="grid gap-10 md:grid-cols-[1fr_1.1fr]">
      <div>
        <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Preise · Damen</p>
        <h2 class="reveal mt-3 font-serif text-[clamp(2rem,1rem+3.5vw,3.4rem)] font-medium leading-[1.02]" style="transition-delay:.08s">Die Kunst<br><span class="italic text-terra">der Farbe.</span></h2>
        <p class="reveal mt-5 max-w-[40ch] text-inkSoft" style="transition-delay:.16s">Grauabdeckung, Aufhellung oder natürliche Highlights – Balayage, Ombré, Wurzelfarbe. Auf Hautton & Haartyp abgestimmt.</p>
        <div class="reveal mt-6 space-y-1" style="transition-delay:.24s">${DATA.damen.groups[1].items.map(rowDots).join('')}</div>
      </div>
      <div class="reveal" style="transition-delay:.12s"><div class="relative aspect-[4/5] overflow-hidden rounded-3xl"><img src="${IMG.color}" class="h-full w-full object-cover" alt=""><div class="absolute inset-x-4 bottom-4 rounded-2xl bg-white/85 p-4 backdrop-blur"><p class="font-serif text-lg italic text-ink">„Einfach, natürlich, frisch und elegant."</p></div></div></div>
    </div>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 10 · IMAGE CARDS EXPAND */
imagecards:{
  label:'10 · Foto-Karten (Slide-up)',
  blurb:'Drei große Foto-Karten (Damen/Herren/Kinder); Klick/Hover schiebt die Preisliste von unten herein. Sehr visuell.',
  motion:'Preis-Overlay gleitet per transform von unten herein (Slide-up). Hover am Desktop, Tap mobil. Bild leicht gezoomt.',
  vibe:'Visuell-premium · bildstark',
  render:()=>`
  <section class="bg-cream2 px-7 py-12 sm:px-10">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">Leistungen</p>
    <h2 class="reveal mt-3 mb-7 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium" style="transition-delay:.08s">Tipp auf eine Karte.</h2>
    <div class="grid gap-5 sm:grid-cols-3">
      ${cats.map(c=>`<article class="ovcard relative h-[360px] cursor-pointer overflow-hidden rounded-3xl" tabindex="0"><img src="${DATA[c].img}" class="h-full w-full object-cover transition-transform duration-500 hover:scale-105" alt=""><div class="absolute inset-0 bg-gradient-to-t from-ink/80 to-transparent"></div><h3 class="absolute left-5 top-5 font-serif text-2xl text-cream">${DATA[c].label}</h3><span class="absolute bottom-5 left-5 rounded-full bg-cream/90 px-3 py-1 text-xs font-semibold text-ink">Preise ansehen ↑</span><div class="ov absolute inset-x-0 bottom-0 max-h-[78%] overflow-auto rounded-t-2xl bg-cream p-5"><h4 class="font-serif text-lg font-medium text-terra">${DATA[c].label}</h4>${DATA[c].groups.map(g=>g.items.map(rowDots).join('')).join('')}</div></article>`).join('')}
    </div>
  </section>${filler('light')}`,
  init:(vp)=>{vp.querySelectorAll('.ovcard').forEach(c=>{const t=()=>c.classList.toggle('open');c.addEventListener('click',t);c.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();t();}});});},
},
};

/* ============ HELPERS ============ */
function rowDots([n,p,f]){return `<div class="flex items-baseline gap-3 border-b border-dashed border-ink/15 py-2 ${f?'rounded-lg bg-orange/10 px-2 -mx-2':''}"><span class="font-medium text-ink">${n}${f?' <span class="ml-1 rounded-full bg-terra px-2 py-0.5 text-[0.6rem] font-bold uppercase text-white">Spezialität</span>':''}</span><span class="-translate-y-1 flex-1 border-b border-dotted border-ink/25"></span><span class="whitespace-nowrap font-semibold tabular-nums text-brownDark">${p}</span></div>`;}
function occBlock(){return `<div class="overflow-hidden rounded-2xl bg-gradient-to-br from-brown to-brownDark p-6 text-cream sm:p-7"><p class="text-xs font-semibold uppercase tracking-[0.22em] text-orange">${OCC.kick}</p><h3 class="mt-2 font-serif text-2xl font-medium">${OCC.title}</h3><p class="mt-3 text-sm text-cream/85">${OCC.text}</p><p class="mt-3 font-serif text-lg">${OCC.price}</p></div>`;}
function splitInit(vp){const links=[...vp.querySelectorAll('.sp-link')],secs=[...vp.querySelectorAll('.sp-sec')];
  const setA=id=>links.forEach(l=>{const on=l.dataset.c===id;l.classList.toggle('bg-terra/10',on);l.classList.toggle('text-ink',on);l.classList.toggle('text-inkSoft',!on);});
  links.forEach(l=>l.onclick=e=>{e.preventDefault();vp.querySelector('#sp-'+l.dataset.c)?.scrollIntoView({behavior:'smooth',block:'start'});});
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)setA(e.target.id.replace('sp-',''));}),{root:vp,rootMargin:'-20% 0px -65% 0px'});secs.forEach(s=>io.observe(s));setA(cats[0]);}

/* ============ SHELL ============ */
function filler(t){const d=t==='dark';return `<section class="${d?'bg-ink text-cream':'bg-cream2 text-ink'} px-6 py-12"><p class="text-center font-serif text-lg ${d?'text-cream/55':'text-inkSoft'}">↑ weiter scrollen</p><div class="h-[30vh]"></div></section>`;}
let io;function wireReveal(vp){if(io)io.disconnect();io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.12});vp.querySelectorAll('.reveal').forEach(el=>io.observe(el));}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();wireReveal(vp);requestAnimationFrame(()=>{vp.querySelectorAll('.reveal').forEach(el=>{const r=el.getBoundingClientRect();if(r.top<vp.clientHeight+40)el.classList.add('in');});c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
