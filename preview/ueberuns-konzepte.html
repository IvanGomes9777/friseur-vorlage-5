<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salon Muster · Über uns – 5 Design-Konzepte</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.16,1,0.3,1);--eq:cubic-bezier(0.25,1,0.5,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(460px,76vh,820px);overflow-y:auto;overflow-x:hidden;position:relative;background:#F9F6F2;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .8s var(--eo),transform .8s var(--eo)}.reveal.in{opacity:1;transform:none}
  .pop{opacity:0;transform:translateY(16px) scale(.965);transition:opacity .7s var(--eo),transform .7s var(--eo)}.pop.in{opacity:1;transform:none}
  .clip{clip-path:inset(0 100% 0 0);transition:clip-path 1.05s var(--eo)}.clip.in{clip-path:inset(0 0 0 0)}
  .lift{transition:transform .3s var(--eo),box-shadow .3s var(--eo)}.lift:hover{transform:translateY(-4px);box-shadow:0 24px 50px -28px rgba(42,33,27,.55)}
  .btn{transition:transform .18s var(--eq),background-color .22s}.btn:active{transform:scale(.97)}
  @media (prefers-reduced-motion:reduce){.reveal,.pop,.clip{opacity:1!important;transform:none!important;clip-path:none!important;transition:none}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Salon Muster · Relaunch</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Sektion 03 — Über uns</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Fünf Richtungen für „Wer wir sind". Tab wählen, im Fenster <b>scrollen</b>. Echte Texte/O-Töne; Fotos = Unsplash-Vorschau (final: euer Salon + Maria).</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">salon-muster.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">O-Töne &amp; Zielgruppen aus dem Salon-Briefing · Farben &amp; Fonts aus dem Projekt.</footer>

<script>
const IMG={
  salon:"https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1400&q=80",
  maria:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80",
  chair:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1100&q=80",
  detail:"https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=1000&q=80",
};
const KICK='Wer wir sind';
const H='Friseurmeisterbetrieb im Innenstadt — ohne Termine';
const QUOTE='Style zu Mensch, passender Look und Zufriedenheit.';
const P1='Dein Friseur Salon Muster im Innenstadt am Innenstadt ist zentral, gemütlich und entspannend — und weit mehr als ein Salon. Hier bekommst du den Kopf frei. Wir stehen für Qualität, Authentizität und die fachliche Kunst des Schneidens, Färbens und Verwöhnens.';
const P2='Als Expert:innen für Haarpflege und natürliche Highlights lieben wir Schnitte für langes, dünnes und lockiges Haar — und für Herren die geradlinige, klassische Frisur. Modern und klassisch im Einklang: einfach, natürlich, frisch und elegant.';
const USPS=['Meisterbetrieb','Ohne Termine','Faire Preise','Barrierefrei'];
const AUD=[
  ['🚲','Junge Leute & Studenten','Komm einfach mit der Fahrrad vorbei. Coole Farben, Schnitte und Beratung zu fairen Preisen.'],
  ['👵','Seniorinnen & Senioren','Ebenerdiger Eingang, kurze Wartezeiten ohne Anmeldung, Bushaltestellen direkt vor der Tür.'],
  ['👨‍👩‍👧','Für Jung & Alt','Die Frisur kennt keine Generationsgrenze — typgerechte Looks für die ganze Familie.'],
];
const uspRow=(dark)=>USPS.map(u=>`<span class="rounded-full ${dark?'bg-white/10 text-cream':'bg-cream2 text-brownDark'} px-3.5 py-1.5 text-xs font-semibold">${u}</span>`).join('');
const audCards=(dark)=>AUD.map(([i,t,x],n)=>`<article class="pop lift rounded-2xl border ${dark?'border-white/10 bg-white/5':'border-ink/10 bg-cream2'} p-5"><span class="grid h-11 w-11 place-items-center rounded-xl bg-terra/15 text-xl">${i}</span><h3 class="mt-3 font-serif text-lg font-medium ${dark?'text-cream':'text-ink'}">${t}</h3><p class="mt-2 text-sm ${dark?'text-cream/65':'text-inkSoft'}">${x}</p></article>`).join('');

const CONCEPTS={

/* 1 · EDITORIAL TWO-COLUMN */
editorial:{
  label:'01 · Editorial Two-Column',
  blurb:'Foto links, Text rechts, große Serif-Pull-Quote. Klar, redaktionell, vertrauenswürdig — die sichere Bank.',
  motion:'Foto öffnet per clip-path (von links). Text staffelt ein. USP-Chips poppen nach. Zielgruppen-Karten heben beim Hover an.',
  vibe:'Magazin / klassisch-edel',
  render:()=>`
  <section class="bg-cream px-7 py-14 sm:px-12">
    <div class="grid items-center gap-9 lg:grid-cols-2">
      <div class="reveal"><div class="clip relative aspect-[16/11] overflow-hidden rounded-2xl shadow-2xl"><img src="${IMG.salon}" class="h-full w-full object-cover" alt="Salon"></div>
        <div class="mt-4 flex flex-wrap gap-2">${uspRow(false)}</div></div>
      <div>
        <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">${KICK}</p>
        <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium leading-tight" style="transition-delay:.1s">${H}</h2>
        <p class="reveal mt-4 font-serif text-lg italic text-brownDark" style="transition-delay:.18s">„${QUOTE}"</p>
        <div class="reveal mt-4 space-y-3 text-inkSoft" style="transition-delay:.26s"><p>${P1}</p><p>${P2}</p></div>
      </div>
    </div>
    <div class="mt-8 grid gap-4 sm:grid-cols-3">${audCards(false)}</div>
  </section>${filler('light')}`,
  init:()=>{},
},

/* 2 · STICKY PHOTO + SCROLLING STORY */
sticky:{
  label:'02 · Sticky Photo + Story',
  blurb:'Foto bleibt stehen, während die Geschichte daneben vorbeiscrollt. Zahlen zählen hoch. Ruhig, premium, „Apple-y".',
  motion:'Sticky-Pinning des Fotos. Absätze erscheinen nacheinander beim Scrollen. Kennzahlen (15+, 87, 4,9) zählen hoch, sobald sichtbar.',
  vibe:'Premium · scroll-erzählerisch',
  render:()=>`
  <section class="bg-cream px-7 py-12 sm:px-12">
    <div class="grid gap-10 md:grid-cols-2">
      <div class="md:sticky md:top-8 md:self-start">
        <div class="reveal relative aspect-[4/5] overflow-hidden rounded-2xl shadow-2xl"><img src="${IMG.chair}" class="h-full w-full object-cover" alt="Salon innen"></div>
        <div class="mt-4 grid grid-cols-3 gap-3 text-center">
          <div><b class="block font-serif text-3xl text-ink" data-count="15">0</b><span class="text-xs text-inkSoft">+ Jahre</span></div>
          <div><b class="block font-serif text-3xl text-ink" data-count="87">0</b><span class="text-xs text-inkSoft">Bewertungen</span></div>
          <div><b class="block font-serif text-3xl text-ink" data-count="4.9" data-dec="1">0</b><span class="text-xs text-inkSoft">★ Schnitt</span></div>
        </div>
      </div>
      <div class="flex flex-col justify-center">
        <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">${KICK}</p>
        <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium leading-tight" style="transition-delay:.1s">${H}</h2>
        <p class="reveal mt-5 font-serif text-xl italic text-brownDark" style="transition-delay:.16s">„${QUOTE}"</p>
        <p class="reveal mt-5 text-inkSoft" style="transition-delay:.22s">${P1}</p>
        <p class="reveal mt-4 text-inkSoft" style="transition-delay:.28s">${P2}</p>
        <div class="reveal mt-6 flex flex-wrap gap-2" style="transition-delay:.34s">${uspRow(false)}</div>
        <div class="mt-8 grid gap-4 sm:grid-cols-1">${audCards(false)}</div>
      </div>
    </div>
  </section>${filler('light')}`,
  init:(vp)=>countUp(vp),
},

/* 3 · OVERLAPPING LAYERED COLLAGE */
collage:{
  label:'03 · Layered Collage',
  blurb:'Salonfoto mit überlappenden, schwebenden Karten (Zitat, Kennzahl, USP) — Tiefe & Parallax. Kreativ-editorial.',
  motion:'Karten parallaxen bei Maus & Scroll auf verschiedenen Ebenen. Reveal beim Eintritt. Zielgruppen als Hover-Lift-Karten.',
  vibe:'Kreativ-Agentur · dynamisch',
  render:()=>`
  <section class="overflow-hidden bg-cream2 px-7 py-14 sm:px-12">
    <p class="reveal text-center text-xs font-semibold uppercase tracking-[0.22em] text-terra">${KICK}</p>
    <h2 class="reveal mx-auto mt-3 max-w-[20ch] text-center font-serif text-[clamp(1.7rem,1rem+2.8vw,2.8rem)] font-medium leading-tight" style="transition-delay:.1s">${H}</h2>
    <div class="relative mx-auto mt-10 max-w-3xl">
      <div class="reveal relative aspect-[16/10] overflow-hidden rounded-2xl shadow-2xl"><img src="${IMG.salon}" class="h-full w-full object-cover" alt="Salon"></div>
      <div data-depth="0.05" class="reveal absolute -left-3 -top-5 max-w-[230px] rounded-2xl bg-ink p-4 text-cream shadow-xl sm:-left-8"><p class="font-serif text-base italic">„${QUOTE}"</p></div>
      <div data-depth="0.1" class="reveal absolute -bottom-5 -right-2 rounded-2xl bg-terra px-5 py-4 text-white shadow-xl sm:-right-8"><b class="block font-serif text-3xl">4,9 ★</b><span class="text-xs">87 Rezensionen</span></div>
      <div data-depth="0.08" class="reveal absolute -bottom-6 left-6 hidden rounded-full bg-white px-4 py-2 text-xs font-semibold text-brownDark shadow-lg sm:block">Meisterbetrieb · seit 15+ Jahren</div>
    </div>
    <div class="mx-auto mt-16 max-w-3xl space-y-3 text-center text-inkSoft"><p class="reveal">${P1}</p></div>
    <div class="mt-8 grid gap-4 sm:grid-cols-3">${audCards(false)}</div>
  </section>${filler('light')}`,
  init:(vp)=>depthParallax(vp),
},

/* 4 · DARK LUXE STATEMENT */
luxe:{
  label:'04 · Dark Luxe Statement',
  blurb:'Kohärent zu Navbar/Hero: dunkler Grund, große Serif-Zitat-Bühne, Marias Porträt mit Goldrahmen, Gold-Akzente.',
  motion:'Zitat per Reveal groß gesetzt. Porträt öffnet per clip-path. Goldlinie wächst. Zielgruppen als edle dunkle Kacheln mit Hover-Lift.',
  vibe:'Luxus / High-End · markentreu',
  render:()=>`
  <section class="bg-ink px-7 py-16 text-cream sm:px-12">
    <div class="mx-auto grid max-w-5xl items-center gap-10 md:grid-cols-[1.1fr_.9fr]">
      <div>
        <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">${KICK}</p>
        <blockquote class="reveal mt-5 font-serif text-[clamp(1.8rem,1rem+3.2vw,3rem)] font-medium leading-[1.1]" style="transition-delay:.1s">„${QUOTE}"</blockquote>
        <div class="reveal mt-6 h-px w-0 bg-gradient-to-r from-orange to-transparent transition-[width] duration-1000 ease-out gold" style="width:0"></div>
        <p class="reveal mt-6 text-cream/75" style="transition-delay:.4s">${P1}</p>
        <div class="reveal mt-6 flex flex-wrap gap-2" style="transition-delay:.5s">${uspRow(true)}</div>
      </div>
      <div class="relative">
        <div class="absolute -inset-3 rounded-3xl border border-orange/30"></div>
        <div class="clip relative aspect-[3/4] overflow-hidden rounded-2xl"><img src="${IMG.maria}" class="h-full w-full object-cover" alt="Maria – Inhaberin (Platzhalter)"></div>
        <span class="absolute -bottom-3 left-1/2 -translate-x-1/2 whitespace-nowrap rounded-full bg-orange px-4 py-1.5 text-xs font-semibold text-ink">Maria · Friseurmeisterin</span>
      </div>
    </div>
    <div class="mx-auto mt-12 grid max-w-5xl gap-4 sm:grid-cols-3">${audCards(true)}</div>
  </section>${filler('dark')}`,
  init:(vp)=>{ const g=vp.querySelector('.gold'); requestAnimationFrame(()=>g&&(g.style.width='42%')); },
},

/* 5 · MEISTERBETRIEB TIMELINE */
timeline:{
  label:'05 · Meisterbetrieb Timeline',
  blurb:'Erzählt die Geschichte „seit 15 Jahren" als Zeitstrahl mit Meilensteinen — Handwerk &amp; Werte greifbar.',
  motion:'Die Zeitstrahl-Linie zeichnet sich beim Scrollen ein, Meilensteine erscheinen nacheinander mit ihren Punkten. Zielgruppen als Icons-Reihe.',
  vibe:'Storytelling · handwerklich-warm',
  render:()=>`
  <section class="bg-cream px-7 py-14 sm:px-12">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.22em] text-terra">${KICK}</p>
    <h2 class="reveal mt-3 max-w-[24ch] font-serif text-[clamp(1.7rem,1rem+2.6vw,2.6rem)] font-medium leading-tight" style="transition-delay:.1s">${H}</h2>
    <p class="reveal mt-4 max-w-[60ch] font-serif text-lg italic text-brownDark" style="transition-delay:.18s">„${QUOTE}"</p>
    <ol class="relative mt-10 ml-3 border-l-2 border-terra/30">
      ${[
        ['Meisterhandwerk','Qualität, Authentizität und die fachliche Kunst des Schneidens, Färbens und Verwöhnens.'],
        ['Ohne Termine','Walk-In im Innenstadt — komm einfach vorbei, ohne lange Wartezeiten.'],
        ['Für alle da','Studierende, Senior:innen, Familien — typgerecht und fair kalkuliert.'],
        ['Natürlich schön','Einfach, natürlich, frisch und elegant — modern und klassisch im Einklang.'],
      ].map(([t,x],i)=>`
        <li class="reveal relative mb-8 pl-8" style="transition-delay:${i*0.12}s">
          <span class="absolute -left-[11px] top-1 grid h-5 w-5 place-items-center rounded-full bg-terra text-[10px] font-bold text-white">${i+1}</span>
          <h3 class="font-serif text-xl font-medium">${t}</h3>
          <p class="mt-1 max-w-[52ch] text-inkSoft">${x}</p>
        </li>`).join('')}
    </ol>
    <div class="mt-6 flex flex-wrap gap-2">${uspRow(false)}</div>
    <div class="mt-8 grid gap-4 sm:grid-cols-3">${audCards(false)}</div>
  </section>${filler('light')}`,
  init:()=>{},
},
};

/* ============ HELPERS ============ */
function reduced(){return matchMedia('(prefers-reduced-motion: reduce)').matches;}
function fine(){return matchMedia('(hover:hover) and (pointer:fine)').matches && !reduced();}
function filler(t){const d=t==='dark';return `<section class="${d?'bg-ink text-cream':'bg-cream2 text-ink'} px-6 py-14"><p class="text-center font-serif text-xl ${d?'text-cream/60':'text-inkSoft'}">↑ scrolle weiter</p><div class="h-[45vh]"></div></section>`;}
let io;
function wireReveal(vp){ if(io)io.disconnect(); io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.12}); vp.querySelectorAll('.reveal,.pop,.clip').forEach(el=>io.observe(el)); }
function staggerPop(vp){ vp.querySelectorAll('.pop').forEach((el,i)=>el.style.transitionDelay=(i*0.1)+'s'); }
function depthParallax(vp){ const ls=[...vp.querySelectorAll('[data-depth]')]; if(!ls.length)return;
  if(!reduced())vp.addEventListener('scroll',()=>ls.forEach(l=>l.style.transform=`translateY(${vp.scrollTop*+l.dataset.depth*-1}px)`),{passive:true});
  if(fine())vp.addEventListener('mousemove',e=>{const r=vp.getBoundingClientRect(),x=e.clientX-r.left-r.width/2,y=e.clientY-r.top-r.height/2;ls.forEach(l=>{const d=+l.dataset.depth;l.style.transform=`translate(${x*d}px,${y*d}px)`;});}); }
function countUp(vp){ const els=vp.querySelectorAll('[data-count]'); const obs=new IntersectionObserver(es=>es.forEach(e=>{if(!e.isIntersecting)return;const el=e.target,to=+el.dataset.count,dec=+(el.dataset.dec||0);if(reduced()){el.textContent=to.toFixed(dec);obs.unobserve(el);return;}let t0;const step=t=>{t0=t0||t;const p=Math.min((t-t0)/900,1);el.textContent=(to*(1-Math.pow(1-p,3))).toFixed(dec);if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);obs.unobserve(el);}),{root:vp,threshold:.6}); els.forEach(el=>obs.observe(el)); }

/* ============ RENDER / SWITCH ============ */
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();staggerPop(vp);wireReveal(vp);requestAnimationFrame(()=>{vp.querySelectorAll('.reveal,.pop,.clip').forEach(el=>{const r=el.getBoundingClientRect();if(r.top<vp.clientHeight+40)el.classList.add('in');});c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
