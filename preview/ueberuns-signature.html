<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salon Muster · Über uns – Signature FX (31–35)</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<script>
  tailwind.config={theme:{extend:{
    colors:{cream:"#F9F6F2",cream2:"#F2ECE3",ink:"#2A211B",inkSoft:"#6B5D50",brown:"#8B6F47",brownDark:"#6E5535",terra:"#CC7755",sage:"#B5B5A0",orange:"#F4A460"},
    fontFamily:{serif:['Fraunces','Georgia','serif'],sans:['"Plus Jakarta Sans"','system-ui','sans-serif'],mono:['"JetBrains Mono"','monospace']},
  }}};
</script>
<style>
  :root{--eo:cubic-bezier(0.23,1,0.32,1);}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#EBE5DC;}
  .viewport{height:clamp(500px,80vh,880px);overflow-y:auto;overflow-x:hidden;position:relative;background:#0f0b08;}
  .viewport::-webkit-scrollbar{width:10px}.viewport::-webkit-scrollbar-thumb{background:#cdbfae;border-radius:8px}
  .btn{transition:transform .16s var(--eo),background-color .22s}.btn:active{transform:scale(.97)}
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .7s var(--eo),transform .7s var(--eo)}.reveal.in{opacity:1;transform:none}
  .duo{filter:grayscale(1) contrast(1.05) sepia(.25);transition:filter 1.1s var(--eo)}.duo.in{filter:none}
  .spot-color{-webkit-mask-image:radial-gradient(circle 170px at var(--mx,50%) var(--my,50%),#000 0,rgba(0,0,0,.2) 55%,transparent 72%);mask-image:radial-gradient(circle 170px at var(--mx,50%) var(--my,50%),#000 0,rgba(0,0,0,.2) 55%,transparent 72%)}
  .trail-img{position:absolute;width:160px;height:200px;object-fit:cover;border-radius:14px;pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.7);transition:opacity .7s var(--eo),transform .7s var(--eo);will-change:transform,opacity}
  @media (prefers-reduced-motion:reduce){.reveal{opacity:1!important;transform:none!important}.duo{filter:none}.spot-color{-webkit-mask-image:none;mask-image:none}.trail-img{display:none}}
</style>
</head>
<body class="text-ink">

<header class="mx-auto max-w-6xl px-5 pt-8 pb-4">
  <p class="font-sans text-[0.7rem] font-semibold uppercase tracking-[0.32em] text-terra">Salon Muster · Signature FX</p>
  <h1 class="mt-2 font-serif text-3xl sm:text-4xl font-semibold tracking-tight">Über uns — frische Effekte (31–35)</h1>
  <p class="mt-2 max-w-2xl text-[0.95rem] leading-relaxed text-inkSoft">Neue, eigenständige Interaktionen. <b>Maus bewegen</b> (31, 35), <b>scrollen</b> (32, 34) oder einfach ansehen (33).</p>
</header>

<nav class="sticky top-0 z-30 mx-auto mb-5 max-w-6xl bg-[#EBE5DC]/85 px-5 py-3 backdrop-blur-md"><div id="tabs" class="flex flex-wrap gap-2"></div></nav>

<main class="mx-auto max-w-6xl px-5 pb-6">
  <div class="overflow-hidden rounded-2xl border border-black/10 bg-white shadow-[0_30px_80px_-40px_rgba(42,33,27,0.5)]">
    <div class="flex items-center gap-2 border-b border-black/10 bg-cream2 px-4 py-2.5">
      <span class="h-3 w-3 rounded-full bg-[#E6A09B]"></span><span class="h-3 w-3 rounded-full bg-[#F4D06F]"></span><span class="h-3 w-3 rounded-full bg-[#9BE6A0]"></span>
      <div class="mx-auto rounded-md bg-white/70 px-3 py-1 text-xs text-inkSoft">salon-muster.de</div>
    </div>
    <div id="viewport" class="viewport"></div>
  </div>
  <section id="notes" class="mt-5 grid gap-4 sm:grid-cols-[1.1fr_1fr]"></section>
</main>

<footer class="mx-auto max-w-6xl px-5 py-8 text-xs text-inkSoft">Signature-Interaktionen · GPU-only · reduce-motion-sicher.</footer>

<script>
const IMG={
  salon:"https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=1500&q=80",
  chair:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1100&q=80",
  color:"https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?auto=format&fit=crop&w=1100&q=80",
  detail:"https://images.unsplash.com/photo-1599351431202-1e0f0137899a?auto=format&fit=crop&w=1000&q=80",
  maria:"https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=1000&q=80",
  man:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?auto=format&fit=crop&w=1100&q=80",
};
const QUOTE='Style zu Mensch, passender Look und Zufriedenheit.';
const reduced=()=>matchMedia('(prefers-reduced-motion: reduce)').matches;
const fine=()=>matchMedia('(hover:hover) and (pointer:fine)').matches && !reduced();

const CONCEPTS={

/* 31 · SPOTLIGHT REVEAL */
spotlight:{
  label:'31 · Spotlight-Reveal',
  blurb:'Das Salonfoto ist gedämpft/duoton — ein Lichtkegel folgt der Maus und enthüllt es in Farbe. Mysteriös, premium, interaktiv.',
  motion:'Radiale Masken-Spotlight folgt dem Cursor (live). Text per Reveal. Touch/reduce: Bild dauerhaft in Farbe sichtbar.',
  vibe:'Cinematic-interaktiv · „Aha"',
  render:()=>`
  <section class="grid items-center gap-10 bg-[#0f0b08] px-7 py-16 text-cream md:grid-cols-2 sm:px-12">
    <div>
      <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">Wer wir sind</p>
      <h2 class="reveal mt-4 font-serif text-[clamp(1.8rem,1rem+3vw,3rem)] font-medium leading-tight" style="transition-delay:.1s">Mehr als ein Salon — <span class="italic text-orange">ein Gefühl.</span></h2>
      <p class="reveal mt-5 max-w-[44ch] text-cream/75" style="transition-delay:.2s">Zentral, gemütlich, entspannend. Hier bekommst du den Kopf frei — die fachliche Kunst des Schneidens, Färbens und Verwöhnens.</p>
      <p class="reveal mt-4 font-serif text-lg italic text-orange/90" style="transition-delay:.28s">„${QUOTE}"</p>
    </div>
    <div class="spot-host relative aspect-[4/5] overflow-hidden rounded-3xl">
      <img src="${IMG.salon}" class="absolute inset-0 h-full w-full object-cover opacity-30 grayscale" alt="">
      <img src="${IMG.salon}" class="spot-color absolute inset-0 h-full w-full object-cover" alt="Salon">
      <span class="pointer-events-none absolute bottom-4 left-4 text-xs uppercase tracking-widest text-cream/60">Maus bewegen ✦</span>
    </div>
  </section>${filler('dark')}`,
  init:(vp)=>{const host=vp.querySelector('.spot-host'),col=vp.querySelector('.spot-color');if(!host||!fine())return;
    host.addEventListener('mousemove',e=>{const r=host.getBoundingClientRect();col.style.setProperty('--mx',((e.clientX-r.left)/r.width*100)+'%');col.style.setProperty('--my',((e.clientY-r.top)/r.height*100)+'%');});
    host.addEventListener('mouseleave',()=>{col.style.setProperty('--mx','50%');col.style.setProperty('--my','-30%');});},
},

/* 32 · DUOTONE → COLOR */
duotone:{
  label:'32 · Duotone → Farbe',
  blurb:'Bilder erscheinen in edlem Schwarzweiß und färben sich beim Reinscrollen in volle Farbe. Ruhig, redaktionell, sehr „Apple".',
  motion:'Beim Eintritt: filter grayscale→none über 1,1 s + Text-Reveal. Sanft &amp; hochwertig. Reduce: direkt in Farbe.',
  vibe:'Editorial-clean · elegant',
  render:()=>`
  <section class="bg-[#0f0b08] px-7 py-16 text-cream sm:px-12">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">Wer wir sind</p>
    <h2 class="reveal mt-3 max-w-[22ch] font-serif text-[clamp(1.7rem,1rem+2.6vw,2.8rem)] font-medium leading-tight" style="transition-delay:.08s">Einfach, natürlich, frisch und elegant.</h2>
    <div class="mt-10 grid gap-5 sm:grid-cols-3">
      ${[[IMG.color,'Farbe & Balayage'],[IMG.chair,'Schnitt & Styling'],[IMG.man,'Herren']].map(([s,t])=>`
      <figure class="overflow-hidden rounded-2xl"><img src="${s}" class="duo aspect-[3/4] w-full object-cover" alt="${t}"><figcaption class="mt-3 font-serif text-lg">${t}</figcaption></figure>`).join('')}
    </div>
    <p class="reveal mt-10 max-w-[56ch] text-cream/70" style="transition-delay:.2s">Als Expert:innen für Haarpflege und natürliche Highlights begeistern wir uns für jeden Haartyp — modern und klassisch im Einklang.</p>
  </section>${filler('dark')}`,
  init:(vp)=>{const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.25});vp.querySelectorAll('.duo').forEach(d=>io.observe(d));},
},

/* 33 · TEXT DECODE + MAGNETIC */
decode:{
  label:'33 · Text-Decode + Magnetic',
  blurb:'Die Headline „entschlüsselt" sich aus zufälligen Zeichen, die Buttons sind magnetisch. Techy-elegant, Awwwards-Detail.',
  motion:'Buchstaben scrambeln kurz und rasten ein (Decode). Magnetische CTAs folgen leicht dem Cursor. Reduce: sofort lesbar, kein Magnet.',
  vibe:'Techy-edel · Detailverliebt',
  render:()=>`
  <section class="grid min-h-[clamp(440px,60vh,640px)] place-items-center bg-[#0f0b08] px-7 py-16 text-center text-cream">
    <div class="mx-auto max-w-2xl">
      <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">Salon Muster · seit 15+ Jahren</p>
      <h2 class="decode mt-5 font-serif text-[clamp(2rem,1rem+4vw,3.6rem)] font-medium leading-tight" data-text="Frisuren für Dich. Ohne Termin."></h2>
      <p class="reveal mt-5 text-cream/75" style="transition-delay:.2s">Komm rein, setz dich, sieh gut aus — Meisterhandwerk im Innenstadt Musterstadt.</p>
      <div class="mt-8 flex flex-wrap justify-center gap-3.5">
        <a href="#" class="mag btn inline-flex min-h-[48px] items-center rounded-full bg-orange px-6 font-semibold text-ink">Vorbeikommen</a>
        <a href="#" class="mag btn inline-flex min-h-[48px] items-center rounded-full border border-cream/40 px-6 font-semibold text-cream">Leistungen</a>
      </div>
    </div>
  </section>${filler('dark')}`,
  init:(vp)=>decodeInit(vp),
},

/* 34 · ODOMETER STATS */
odometer:{
  label:'34 · Odometer-Zahlen',
  blurb:'Die Kennzahlen rollen wie ein Zählwerk hoch (15+ · 87 · 4,9★), begleitet von einem Werte-Laufband. Selbstbewusst, „proof-first".',
  motion:'Beim Sichtbarwerden zählen die Zahlen mit Ease hoch (rollendes Gefühl). Werte-Marquee darunter. Reduce: Endwerte direkt.',
  vibe:'Bold · proof-first',
  render:()=>`
  <section class="bg-[#0f0b08] px-7 py-20 text-center text-cream sm:px-12">
    <p class="reveal text-xs font-semibold uppercase tracking-[0.3em] text-orange">Worauf ihr euch verlasst</p>
    <h2 class="reveal mt-3 font-serif text-[clamp(1.7rem,1rem+2.6vw,2.8rem)] font-medium" style="transition-delay:.08s">Zahlen, die für sich sprechen</h2>
    <div class="mx-auto mt-12 grid max-w-3xl grid-cols-1 gap-8 sm:grid-cols-3">
      ${[['15','+','Jahre Meisterbetrieb'],['87','','Google-Bewertungen'],['4.9','★','Schnitt aus 87']].map(([n,suf,lab],i)=>`
      <div><div class="font-mono text-[clamp(2.6rem,8vw,4.4rem)] font-bold leading-none text-orange"><span class="odo" data-to="${n}" data-dec="${n.includes('.')?1:0}">0</span>${suf}</div><p class="mt-3 text-sm text-cream/70">${lab}</p></div>`).join('')}
    </div>
    <div class="mt-14 overflow-hidden border-y border-white/10 py-3"><div class="odo-mq flex whitespace-nowrap font-serif text-xl italic text-cream/50"></div></div>
  </section>${filler('dark')}`,
  init:(vp)=>odoInit(vp),
},

/* 35 · CURSOR IMAGE TRAIL */
trail:{
  label:'35 · Cursor-Bilderspur',
  blurb:'Beim Bewegen der Maus zieht eine Spur eurer Arbeiten hinter dem Cursor her. Verspielt-mutig — klassischer Awwwards-Effekt.',
  motion:'Maus-Bewegung spawnt Bilder, die kurz aufblitzen und ausfaden (gedrosselt). Zentrales Statement bleibt ruhig. Touch/reduce: nur das Statement.',
  vibe:'Awwwards-verspielt · mutig',
  render:()=>`
  <section class="trail-host relative grid min-h-[clamp(460px,64vh,720px)] place-items-center overflow-hidden bg-[#0f0b08] px-6 text-center text-cream">
    <div class="pointer-events-none relative z-10 mx-auto max-w-2xl">
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-orange">Salon Muster · Musterstadt</p>
      <h2 class="mt-4 font-serif text-[clamp(2rem,1rem+4.5vw,4rem)] font-medium leading-tight">Beweg die Maus —<br><span class="italic text-orange">sieh, was wir können.</span></h2>
      <p class="mt-5 text-cream/70">Schnitt · Farbe · Balayage · ohne Termin</p>
    </div>
    <p class="absolute bottom-4 left-1/2 -translate-x-1/2 text-xs text-cream/40">↗ Maus über die Fläche bewegen</p>
  </section>${filler('dark')}`,
  init:(vp)=>trailInit(vp),
},
};

/* ============ ENGINES ============ */
function decodeInit(vp){
  const el=vp.querySelector('.decode'); if(!el)return; const text=el.dataset.text;
  if(reduced()){el.textContent=text;return;}
  const chars='ABCDEFGHJKLMNPRSTUVWXYZ0123456789#%&/';
  let frame=0; const total=text.length;
  const tick=()=>{ frame++; let out='';
    for(let i=0;i<total;i++){ if(text[i]===' '){out+=' ';continue;} if(i< frame/2){out+=text[i];} else {out+=chars[Math.floor(Math.random()*chars.length)];} }
    el.textContent=out; if(frame/2<total)requestAnimationFrame(tick); else el.textContent=text; };
  const io=new IntersectionObserver(es=>{if(es[0].isIntersecting){requestAnimationFrame(tick);io.disconnect();}},{root:vp,threshold:.4});io.observe(el);
  // Magnetic
  if(fine())vp.querySelectorAll('.mag').forEach(m=>{m.addEventListener('mousemove',e=>{const r=m.getBoundingClientRect();m.style.transform=`translate(${(e.clientX-(r.left+r.width/2))*.3}px,${(e.clientY-(r.top+r.height/2))*.5}px)`;});m.addEventListener('mouseleave',()=>m.style.transform='');});
}
function odoInit(vp){
  const els=vp.querySelectorAll('.odo'),mq=vp.querySelector('.odo-mq');
  if(mq){const seq=['Meisterhandwerk','Ohne Termine','Faire Preise','Natürlich schön','Persönliche Beratung'].map(w=>`<span class="mx-6">${w} ✦</span>`).join('');mq.innerHTML=seq+seq;
    if(!reduced()){let x=0;const w=mq.scrollWidth/2;const loop=()=>{x=(x-0.6)%w;mq.style.transform=`translateX(${x}px)`;requestAnimationFrame(loop);};requestAnimationFrame(loop);}}
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(!e.isIntersecting)return;const el=e.target,to=+el.dataset.to,dec=+el.dataset.dec;
    if(reduced()){el.textContent=to.toFixed(dec);io.unobserve(el);return;}
    let t0;const step=t=>{t0=t0||t;const p=Math.min((t-t0)/1300,1);const e2=1-Math.pow(1-p,4);el.textContent=(to*e2).toFixed(dec);if(p<1)requestAnimationFrame(step);else el.textContent=to.toFixed(dec);};requestAnimationFrame(step);io.unobserve(el);}),{root:vp,threshold:.5});
  els.forEach(el=>io.observe(el));
}
function trailInit(vp){
  const host=vp.querySelector('.trail-host'); if(!host||!fine())return;
  // Größerer Pool (jedes Bild doppelt) → schnelle Bewegungen recyceln kein noch sichtbares Bild
  const srcs=[IMG.salon,IMG.color,IMG.chair,IMG.detail,IMG.man,IMG.maria];
  const pool=srcs.concat(srcs).map(src=>{const im=document.createElement('img');im.src=src;im.className='trail-img';host.appendChild(im);return im;});
  let idx=0,lx=null,ly=null;
  const STEP=55; // alle 55px Mausweg ein Bild → klassischer, dichter Trail
  const spawn=(x,y)=>{const im=pool[idx%pool.length];idx++;
    im.style.left=x+'px';im.style.top=y+'px';
    im.style.transition='none';im.style.opacity='1';
    im.style.transform=`translate(-50%,-50%) scale(1) rotate(${(Math.random()*12-6).toFixed(1)}deg)`;
    void im.offsetWidth; // reflow → Transition greift sicher
    im.style.transition='opacity .9s var(--eo),transform .9s var(--eo)';
    im.style.opacity='0';im.style.transform='translate(-50%,-50%) scale(.72)';};
  host.addEventListener('mousemove',e=>{const r=host.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
    if(lx===null){lx=x;ly=y;spawn(x,y);return;}
    const dx=x-lx,dy=y-ly,dist=Math.hypot(dx,dy);
    if(dist>=STEP){const steps=Math.min(4,Math.floor(dist/STEP));for(let i=1;i<=steps;i++){spawn(lx+dx*(i/steps),ly+dy*(i/steps));}lx=x;ly=y;}});
}

/* ============ SHELL ============ */
function filler(t){const d=t==='dark';return `<section class="${d?'bg-[#0f0b08] text-cream':'bg-cream2 text-ink'} px-6 py-14"><p class="text-center font-serif text-xl ${d?'text-cream/55':'text-inkSoft'}">↑ weiter scrollen</p><div class="h-[40vh]"></div></section>`;}
let io;
function wireReveal(vp){if(io)io.disconnect();io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in')}),{root:vp,threshold:.12});vp.querySelectorAll('.reveal').forEach(el=>io.observe(el));}
const vp=document.getElementById('viewport'),tabsEl=document.getElementById('tabs'),notesEl=document.getElementById('notes');
const keys=Object.keys(CONCEPTS);let active=keys[0];
function buildTabs(){tabsEl.innerHTML=keys.map(k=>`<button data-k="${k}" class="tab btn rounded-full px-4 py-2 text-sm font-semibold">${CONCEPTS[k].label}</button>`).join('');tabsEl.querySelectorAll('.tab').forEach(b=>b.onclick=()=>select(b.dataset.k));}
function paintTabs(){tabsEl.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.k===active;b.classList.toggle('bg-ink',on);b.classList.toggle('text-cream',on);b.classList.toggle('bg-white',!on);b.classList.toggle('text-ink',!on);b.classList.toggle('border',!on);b.classList.toggle('border-black/10',!on);});}
function notes(){const c=CONCEPTS[active];notesEl.innerHTML=`
  <div class="rounded-2xl border border-black/10 bg-white p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Konzept</p><h3 class="mt-1 font-serif text-xl font-semibold">${c.label.replace(/^\d+\s·\s/,'')}</h3><p class="mt-2 text-sm leading-relaxed text-inkSoft">${c.blurb}</p><p class="mt-3 text-xs font-medium text-brown">${c.vibe}</p></div>
  <div class="rounded-2xl border border-black/10 bg-cream2 p-5"><p class="text-[0.7rem] font-semibold uppercase tracking-[0.25em] text-terra">Animations-Konzept</p><p class="mt-2 text-sm leading-relaxed text-ink/80">${c.motion}</p></div>`;}
function select(k){active=k;paintTabs();notes();const c=CONCEPTS[k];vp.scrollTop=0;vp.innerHTML=c.render();wireReveal(vp);requestAnimationFrame(()=>{vp.querySelectorAll('.reveal').forEach(el=>{const r=el.getBoundingClientRect();if(r.top<vp.clientHeight+40)el.classList.add('in');});c.init&&c.init(vp);});}
buildTabs();select(active);
</script>
</body>
</html>
